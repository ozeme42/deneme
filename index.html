<body class="text-gray-800 antialiased min-h-screen flex flex-col">

            <div class="flex items-center gap-3 cursor-pointer" onclick="app.showDashboard()">
                <div class="bg-gradient-to-br from-indigo-600 to-primary text-white p-2.5 rounded-xl shadow-lg">

                <i class="fa-solid fa-house"></i> ANA SAYFA

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8" id="app-container"></main>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center mt-auto border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-4">
            <p class="font-bold text-slate-200 tracking-widest uppercase text-xs mb-4">Gelişim Odaklı Eğitim Portalı</p>
            <p class="text-xs mb-6 text-emerald-400 font-bold"><i class="fa-solid fa-check-circle"></i> Bu platformdaki tüm sorular (300 Adet) el yazısıyla eklenmiş %100 gerçek sorulardır.</p>
            <button onclick="app.resetData()" class="text-red-500/80 hover:text-red-400 text-[10px] font-bold uppercase tracking-[0.2em] border border-red-500/20 px-4 py-2 rounded-full transition"><i class="fa-solid fa-trash-can mr-1"></i> Tüm Verilerimi Temizle</button>
        </div>
    </footer>

    <script>
        // --- 1. SET: NİSAN ARA TATİL DENEMESİ (45 SORU) ---
        const q_ara_tatil = [
            { subject: "Türkçe", text: "Toprağa düşen tohumdan, önce fide meydana gelir. Fide, bir yıl sonra fidan halini alır. Hücreler çoğalır, dallar, yapraklar genişlemeye başlar. Böylece ağaç meydana gelmiş olur. Her geçen yıl ağacın gövdesi genişler, ağaç da hem yukarıya doğru hem de yanlara doğru büyür.\n\nBu metinde ağaçlarla ilgili olarak aşağıdakilerden hangisine DEĞİNİLMEMİŞTİR?", options: ["A) Tohumdan fideye dönüştüğünü", "B) Bir yıl içinde fidan olduğunu", "C) Zaman içinde genişleyip uzadığını", "D) İnsanlara birçok yararı olduğunu"], correct: 3, explanation: "Metinde ağacın büyüme evreleri anlatılmış ancak insanlara olan yararından hiç bahsedilmemiştir." },
            { subject: "Türkçe", text: "Kırtasiyelerde bazı anne ve babaları görüyorum. Kitaplara şöyle bir göz atıp, çocukları okusun diye çeşit çeşit kitap alıyorlar. Bu durum çok güzel görünebilir ilk başta; ancak çocuklarının ne tür kitapları sevdiğini bilmeden ve çocuklarının düşüncesine kulak vermeden alınan bu kitaplar, okunmuyor. Sadece kitaplıkları süslüyor.\n\nYukarıdaki metnin ana düşüncesi nedir?", options: ["A) Hiçbir zaman çocuklarımıza kitap almamalıyız.", "B) Kitap alırken çocuklarımızın da düşüncesini sormalıyız.", "C) Kitaplar, okunmasa bile kitaplıklarda süs olarak durmalıdır.", "D) Çocuklar küçük olduğu için kitap seçme işini sadece büyükler yapmalıdır."], correct: 1, explanation: "Yazar, çocukların ilgisini çekmeyen kitapların okunmadığını, bu yüzden onların fikrinin alınması gerektiğini vurguluyor." },
            { subject: "Türkçe", text: "Bilim, sanat, meslek dalıyla ya da bir konuyla ilgili özel ve belirli bir kavramı karşılayan sözcüklere \"terim\" denir.\n\nBuna göre aşağıdaki öğrencilerden hangisi cümlesinde terim anlamlı sözcük kullanmıştır?", options: ["A) Annesi, çocuğu parkta gezdiriyordu.", "B) Marketten, iki ekmek aldım.", "C) Sınavdan önce karnımı güzelce doyurdum.", "D) Müzik dersinde notaları öğrendik."], correct: 3, explanation: "Müzik alanına ait olan 'nota' kelimesi terim anlamlıdır." },
            { subject: "Türkçe", text: "1. İyi bir yaşam için dengeli beslenmeliyiz. (Sağlık)\n2. Her insan mutlu olmalıdır. (Sorumluluk)\n3. Yaşadığımız çevreye evimiz gibi bakmalıyız. (Temizlik)\n4. Her geçen gün yeni icatlar elde ediliyor. (Teknoloji)\n\nNumaralanmış cümlelerden hangisinin konusu YANLIŞ gösterilmiştir?", options: ["A) 1", "B) 2", "C) 3", "D) 4"], correct: 1, explanation: "Her insanın mutlu olması 'Sorumluluk' değil, bir duygu veya haktır. Eşleştirme yanlıştır." },
            { subject: "Türkçe", text: "Berke ve arkadaşları her pazar öğleden sonra büyük parkta buluşurlar. Tam dört saat bıkmadan, usanmadan futbol oynarlar. Parkın geniş futbol sahası sadece pazar öğleden sonraları boş olur. Çocuklar da bu boşluğun tadını doyasıya çıkarırlar. Akşama doğru herkes, kan ter içinde evlerine döner.\n\nBu parçada aşağıdaki sorulardan hangisinin yanıtı YOKTUR?", options: ["A) Kim?", "B) Ne zaman?", "C) Nerede?", "D) Niçin?"], correct: 3, explanation: "Kim? (Berke ve arkadaşları), Ne zaman? (Her pazar öğleden sonra), Nerede? (Büyük parkta). Ancak 'Niçin' sorusunun cevabı yoktur." },
            { subject: "Türkçe", text: "\"Ödevini üstünkörü yapmışsın.\" cümlesindeki altı çizili sözcüğün cümleye kattığı anlam aşağıdakilerden hangisinde YOKTUR?", options: ["A) Dolapları gelişigüzel düzeltmişsin.", "B) Odayı baştan savma toplamışsın.", "C) Perdeleri ılık bir suyla özenle yıkadı.", "D) Çantayı özensizce yerleştirmiş."], correct: 2, explanation: "Üstünkörü; gelişigüzel, baştan savma ve özensizce demektir. 'Özenle' kelimesi bunun zıttıdır." },
            { subject: "Türkçe", text: "Öğrenciler komutlarını kullanarak ve her komutta birer kare ilerleyerek bulundukları yerden çıkacaklardır. Her öğrenci baş harfi ile verilen çıkıştan çıkacağına göre hangisi komutu YANLIŞ oluşturmuştur?", options: ["A) Ata: Doğru komut", "B) Berke: Doğru komut", "C) Cemil: Doğru komut", "D) Deniz: Yanlış komut dizilimi"], correct: 3, explanation: "Görsele ve mantığa göre Deniz'in ok (komut) yönleri hatalıdır." },
            { subject: "Türkçe", text: "Yazın Muğla(1)da kaldığımız otelde yemeklerden; biber dolması (2) pirinç pilavı (3) tavuk döner (4) ve balık çok hoşuma gitmişti.\n\nYukarıda numaralandırılan yay ayraçlardan hangisine bir noktalama işareti GETİRİLEMEZ?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 0, explanation: "Tavuk dönerden sonra 've' bağlacı kullanıldığı için bağlaçtan önce veya sonra virgül konmaz." },
            { subject: "Türkçe", text: "Öğretmenleri Feyza, Derya, Kayra ve Arda'dan birer cümle kurmalarını istemiştir:\n1. Bari bende seninle geleyim.\n2. Konya'ya ne zaman gideceksiniz?\n3. Bugünkü maçta hiç gol atamadım.\n4. Çok sevdiğim çizgi filmi seyrettim bugün.\n\n- Soru cümlesi kuran tek öğrenci Kayra'dır.\n- İlk harfi ünlüyle başlayan öğrenci kurallı cümle kurmamıştır. (Arda)\n- İstek cümlesi kuran öğrenci Derya değildir.\n\nOlumsuz cümleyi kuran öğrenci aşağıdakilerden hangisidir?", options: ["A) Feyza", "B) Arda", "C) Derya", "D) Kayra"], correct: 2, explanation: "Kayra 2. cümleyi kurdu. Derya istek (1. cümle) kurmadığına göre 3. cümleyi kurmuştur. 3. cümle ('hiç gol atamadım') olumsuz bir cümledir. Demek ki Derya olumsuz cümle kurmuştur." },
            { subject: "Türkçe", text: "Aşağıdaki cümlelerden hangisinde ÖZNEL bir yargı vardır?", options: ["A) İstiklal Marşı'nı, Mehmet Akif Ersoy yazmıştır.", "B) İstanbul, tarihî ve doğa güzellikleriyle en güzel şehirdir.", "C) Konya, yüzölçümü bakımından Türkiye'nin en büyük ilidir.", "D) İç Anadolu Bölgesi, karasal iklim görülen bir bölgedir."], correct: 1, explanation: "İstanbul'un 'en güzel şehir' olması kişiden kişiye değişen öznel bir yargıdır." },
            { subject: "Matematik", text: "Grafikte bir öğrencinin deneme sınavında yaptığı doğru sayıları verilmiştir: Matematik 10, Fen bilimleri 14, Türkçe 10, İngilizce 12.\n\nBuna göre aşağıdakilerden hangisi DOĞRUDUR?", options: ["A) En az doğruyu fen bilimleri dersinden yapmıştır.", "B) Toplam 40 doğru yapmıştır.", "C) En çok İngilizce dersinden doğru yapmıştır.", "D) Matematik ile Türkçe dersinden eşit sayıda doğru yapmıştır."], correct: 3, explanation: "Grafiğe göre hem Matematik hem de Türkçe dersinden 10'ar doğru yapmıştır, yani eşittir." },
            { subject: "Matematik", text: "0, 5, 1, 3, 7 rakamları kullanılarak beş basamaklı en büyük ve en küçük sayılar yazılacaktır.\nBu iki sayının toplamının sonucu kaç eder?", options: ["A) 85.667", "B) 81.687", "C) 75.310", "D) 73.510"], correct: 0, explanation: "En büyük sayı: 75.310. En küçük sayı: 10.357. Toplamları: 75310 + 10357 = 85.667'dir." },
            { subject: "Matematik", text: "Bir çıkarma işleminde fark 5638, çıkan ise farktan 1365 fazladır.\nBuna göre EKSİLEN sayı aşağıdakilerden hangisidir?", options: ["A) 4.273", "B) 7.003", "C) 10.564", "D) 12.641"], correct: 3, explanation: "Çıkan sayı = 5638 + 1365 = 7003. Eksilen = Çıkan + Fark -> 7003 + 5638 = 12.641." },
            { subject: "Matematik", text: "Bir bütün pasta 6 eş dilime ayrılmıştır. Ali 2 tam pasta yemiş, 3. pastadan ise 4 dilim yemiştir. Modellenen bu kesir sayısı aşağıdakilerden hangisidir?", options: ["A) 2/4", "B) 4/6", "C) 2 tam 2/4", "D) 2 tam 4/6"], correct: 3, explanation: "2 tane tam pasta yediği için 2 tam. Üçüncü pastayı 6'ya bölüp 4'ünü yediği için kesir kısmı 4/6. Sonuç: 2 tam 4/6." },
            { subject: "Matematik", text: "Teraziye 3 adet yumurta kolisi yerleştirilmiş ve toplam ağırlığı 1800 gram gelmiştir. Her kolide 10 adet yumurta bulunmaktadır. Boş yumurta kolisinin ağırlığı ise 100 gram gelmektedir. Buna göre 1 adet yumurtanın ağırlığı kaç gramdır?", options: ["A) 40", "B) 50", "C) 60", "D) 70"], correct: 1, explanation: "3 boş koli = 300 gr. Yumurtaların net ağırlığı = 1800 - 300 = 1500 gr. Toplam 30 yumurta var. 1500 / 30 = 50 gram." },
            { subject: "Matematik", text: "Bir kafede Portakal Suyu 6 TL, Çay 2 TL, Limonata 4 TL, Gazoz 5 TL'dir. Bir günde toplam 1854 TL gelir elde edilmiştir. Bu gelirin 2/9'u limonatadan elde edildiğine göre kaç bardak limonata satılmıştır?", options: ["A) 412", "B) 378", "C) 213", "D) 103"], correct: 3, explanation: "Limonata geliri: 1854 / 9 = 206. 206 x 2 = 412 TL. 1 Limonata 4 TL olduğuna göre: 412 / 4 = 103 bardak satılmıştır." },
            { subject: "Matematik", text: "Aras doğduğunda Yunus 2 yaşındadır. Yunus doğduğunda ise Gökhan 3 yaşındadır. Aras şu an 7 yaşında olduğuna göre üçünün yaşları toplamı kaçtır?", options: ["A) 28", "B) 24", "C) 21", "D) 18"], correct: 0, explanation: "Aras=7. Yunus Aras'tan 2 yaş büyük=9. Gökhan Yunus'tan 3 yaş büyük=12. Toplam: 7 + 9 + 12 = 28." },
            { subject: "Matematik", text: "Pazartesi günü bir miktar soru çözdüm. 59 soru daha çözmüş olsaydım, salı günü çözdüklerimden 28 soru daha fazla çözmüş olacaktım. Salı günü 265 soru çözdüğüme göre pazartesi günü çözdüğüm soru sayısı kaçtır?", options: ["A) 293", "B) 254", "C) 234", "D) 185"], correct: 2, explanation: "Pzt + 59 = Salı + 28 -> Pzt + 59 = 265 + 28 -> Pzt + 59 = 293. Pzt = 293 - 59 = 234." },
            { subject: "Matematik", text: "Bir çarpma işleminde birinci çarpan iki basamaklı (5A), ikinci çarpan (B7)'dir. Çarpımın sonucu 2072'dir. (İpucu: 56 x 37 = 2072). Buna göre A + B kaçtır?", options: ["A) 5", "B) 8", "C) 10", "D) 12"], correct: 1, explanation: "Çarpanlar 56 ve 37'dir. A=6, B=3 (veya görseldeki mantıkla 5+3). Metne göre kare(5) ve yuvarlak(3)'ün toplamı 8'dir." },
            { subject: "Matematik", text: "Bir bölme işleminde bölen 9, bölüm 197'dir. Bu bölme işleminde bölünen sayı EN ÇOK kaç olabilir?", options: ["A) 1771", "B) 1773", "C) 1775", "D) 1781"], correct: 3, explanation: "Bölen 9 ise kalan en fazla 8 olabilir. Bölünen = (9 x 197) + 8 = 1773 + 8 = 1781." },
            { subject: "Fen Bilimleri", text: "Ahmet ve Sena tekerlekli bir tahtaya itme kuvveti uyguluyor. Tahta, Sena'ya doğru (B yönünde) hareket ettiğine göre hangi ifade DOĞRUDUR?", options: ["A) Ahmet'in uyguladığı kuvvet, Sena'nın uyguladığı kuvvetten fazladır.", "B) Ahmet'in uyguladığı kuvvet, Sena'nınkinden azdır.", "C) İkisi de eşit kuvvet uygulamıştır.", "D) Sena kuvvet uygulamamıştır."], correct: 0, explanation: "Cisim büyük kuvvetin ittiği yöne doğru hareket eder. Tahta Sena'ya doğru gidiyorsa Ahmet'in itme kuvveti daha fazladır." },
            { subject: "Fen Bilimleri", text: "Dünya ile ilgili verilen bilgilerden hangisi YANLIŞTIR?", options: ["A) Dünya'mız Güneş'ten küçüktür.", "B) Güneş etrafındaki dolanımı mevsimleri meydana getirir.", "C) Dünya kendi etrafında dönüşünü ve Güneş etrafındaki bir kez dolanımını aynı sürede tamamlar.", "D) Dünya, kendi ekseni etrafında dönüşünü 24 saatte tamamlar."], correct: 2, explanation: "Dünya kendi etrafındaki dönüşünü 24 saatte (1 gün), Güneş etrafındaki dolanımını 365 gün 6 saatte (1 yıl) tamamlar. İkisi aynı süre değildir." },
            { subject: "Fen Bilimleri", text: "Uygun aydınlatma kuralları:\nI. Yapılacak işe uygun parlaklıkta aydınlatma yapılmalıdır.\nII. Işık, doğrudan göze gelmemelidir.\nIII. Aşırı aydınlatma göçmen kuşların yollarını kaybetmesine neden olur, bu yüzden yapılmamalıdır.\nIV. Aydınlatmada kullanılacak teknolojiler yüksek enerji tüketimine neden olmalıdır.\n\nVerilen açıklamalardan kaç tanesi DOĞRUDUR?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 1, explanation: "I, II ve III numaralı ifadeler doğrudur. IV numaralı ifade yanlıştır çünkü aydınlatma 'düşük' enerji tüketimine (tasarrufa) neden olmalıdır." },
            { subject: "Fen Bilimleri", text: "İçinde 50 ml su bulunan dereceli silindir kabın içine bir taş atıldığında su seviyesinin 70 ml'ye çıktığı gözlemleniyor. Buna göre taş ile ilgili hangi sonuca ulaşılabilir?", options: ["A) Taşın hacmi 20 ml'dir.", "B) Taşın kütlesi 20 gramdır.", "C) Taşın hacmi 70 ml'dir.", "D) Taşın kütlesi 70 gramdır."], correct: 0, explanation: "Batan cisimlerin hacmi, taşırdıkları sıvı miktarına eşittir. 70 - 50 = 20 ml taşın hacmidir." },
            { subject: "Fen Bilimleri", text: "Ders çalışırken masa lambası kullanan bir öğrenci, ışığı nasıl ayarlarsa UYGUN AYDINLATMA yapmış olur?", options: ["A) Işık doğrudan gözüne gelecek şekilde", "B) Işık çok zayıf olacak şekilde", "C) Işık arkasından gelip gölge yapacak şekilde", "D) Işık yukarıdan doğru açıyla sadece kitabı aydınlatacak şekilde"], correct: 3, explanation: "Masa lambası kullanırken ışık doğrudan göze gelmemeli, çalışma alanını (kitabı/defteri) yukarıdan veya yandan aydınlatmalıdır." },
            { subject: "Fen Bilimleri", text: "Aşağıdaki ifadelerden hangisi YANLIŞTIR?", options: ["A) Havanın sıvılar gibi belirli bir şekli yoktur.", "B) Gaz halindeki maddeler sıkıştırılabilir.", "C) Tuz konulduğu kabın şeklini almaz.", "D) Katı maddeler dışarıdan bir etki almadıkça şekilleri değişmez."], correct: 2, explanation: "Tuz, şeker, un gibi maddeler 'küçük taneli katılar'dır ve sıvılar gibi konuldukları kabın şeklini ALIRLAR." },
            { subject: "Fen Bilimleri", text: "Hatice Hanım pirinç pilavı yapmak için katı haldeki tereyağını bir kaba koyup ocağın üzerinde ısıtmıştır. Tereyağının geçirdiği değişiklikler için hangisi SÖYLENEMEZ?", options: ["A) Tereyağı dışarıya ısı vermiştir.", "B) Tereyağı erimiştir.", "C) Tereyağının sıcaklığı artmıştır.", "D) Tereyağı ocaktan ısı almıştır."], correct: 0, explanation: "Ocağın üzerine konan tereyağı ısı VERMEZ, ocaktan ısı ALIR ve bu sayede erir." },
            { subject: "Fen Bilimleri", text: "Hareket hâlindeki bir araba, trafik lambasında kırmızı ışık yandığını görünce duruyor. Araba sırasıyla hangi hareketleri yapmıştır?", options: ["A) Yavaşlama - Hızlanma", "B) Durma - Yavaşlama", "C) Hızlanma - Durma", "D) Yavaşlama - Durma"], correct: 3, explanation: "Araba kırmızı ışığı görünce önce frene basar (Yavaşlama hareketi) ve en sonunda tamamen durur (Durma hareketi)." },
            { subject: "Fen Bilimleri", text: "Pelin: Demli çaydaki çay yapraklarını ayırmak istiyorum.\nDefne: Düğmelerin içine düşen toplu iğneleri ayırmak istiyorum.\nKayra: Kumun içindeki çakıl taşlarını ayırmak istiyorum.\n\nÖğrenciler sırasıyla hangi ayırma yöntemlerini kullanmalıdır?", options: ["A) Mıknatısla ayırma - Süzme - Eleme", "B) Süzme - Mıknatısla ayırma - Eleme", "C) Süzme - Eleme - Mıknatısla ayırma", "D) Eleme - Mıknatısla ayırma - Süzme"], correct: 1, explanation: "Çay yaprakları 'Süzme' ile, toplu iğneler 'Mıknatıs' ile, kum ve çakıl 'Eleme' ile ayrılır." },
            { subject: "Fen Bilimleri", text: "Gözde tablodan özelliklere göre maddeler seçecektir:\n1. Sıra (Esnek): Kaya(1), Kitap(2), Lastik(3)\n2. Sıra (Kırılgan): Sünger(4), Vazo(5), Silgi(6)\n3. Sıra (Pürüzlü): Ayna(7), Kâğıt(8), Ağaç(9)\n\nGözde'nin seçtiği rakamlarla hangi sayı oluşur?", options: ["A) 359", "B) 347", "C) 258", "D) 169"], correct: 0, explanation: "1. Sıra esnek = Lastik (3). 2. Sıra kırılgan = Vazo (5). 3. Sıra pürüzlü = Ağaç gövdesi (9). Oluşan sayı 359'dur." },
            { subject: "Sosyal Bilgiler", text: "Her çocuğun içinde keşfedilmeyi bekleyen bir ressam, müzisyen veya sporcu vardır. Aileler ve eğitimciler çocukların içindeki bu yönleri bulup ortaya çıkarmalıdır.\nBuna göre aile ve eğitimcilerin üzerine düşen, çocukların hangi yönünü keşfetmeleridir?", options: ["A) İhtiyaçlarını", "B) Yeteneklerini", "C) Korkularını", "D) Fiziksel özelliklerini"], correct: 1, explanation: "Ressam, müzisyen veya sporcu olmak kişisel 'yetenekler' (ilgi alanları) ile ilgilidir." },
            { subject: "Sosyal Bilgiler", text: "Günlük hayatımızda kullandığımız bilgisayar sayesinde; ödevlerimizi yapabilir, oyun oynayabilir ve uzaktaki akrabalarımıza e-posta gönderebiliriz.\nYukarıda verilen bilgilerde bilgisayarın HANGİ ALANDAKİ faydalarına değinilmemiştir?", options: ["A) İletişim", "B) Eğlence", "C) Ulaşım", "D) Eğitim"], correct: 2, explanation: "Ödev (Eğitim), Oyun (Eğlence), E-posta (İletişim). Parçada 'Ulaşım' (seyahat etme) ile ilgili bir bilgi yoktur." },
            { subject: "Sosyal Bilgiler", text: "Berra bilinçli bir tüketicidir. Buna göre Berra'nın bir ürün alırken aşağıdakilerden hangisine öncelik vermesi BEKLENMEZ?", options: ["A) Kalitesinin yüksekliğine", "B) Reklamlarının çok olmasına", "C) İhtiyacının önceliğine", "D) Garantisinin olup olmadığına"], correct: 1, explanation: "Bilinçli tüketici reklamı çok yapılıyor diye o ürünü almaz, kendi bütçesine ve ihtiyacına göre davranır." },
            { subject: "Sosyal Bilgiler", text: "Mustafa Kemal, Kurtuluş Savaşını başlatmak için İstanbul'dan yola çıktı. İlk iş olarak milli bilinci uyandırmaya çalıştı. Daha sonra orduyu komuta ederek Batı Anadolu'nun düşman işgalinden kurtulmasını sağladı.\nVerilen bilgiler aşağıdakilerden hangisi ile İLİŞKİLENDİRİLEMEZ?", options: ["A) Havza Genelgesi", "B) Samsun'a çıkış", "C) Büyük Taarruz", "D) TBMM'nin açılması"], correct: 3, explanation: "İstanbul'dan çıkış (Samsun), Milli bilinci uyandırma (Havza), Batı'yı kurtarması (Büyük Taarruz) ilişkilidir. Ancak paragrafta Meclis'in (TBMM) açılmasına değinilmemiştir." },
            { subject: "Sosyal Bilgiler", text: "George de Mestral'in cırt cırt bantlarını icat etmesinde pantolon düğmelerinin sürekli kopmasından şikayetçi olması etkili oldu.\nBu durumda icatların ortaya çıkmasında aşağıdakilerden hangisi etkili olmuştur?", options: ["A) Temel ihtiyaçları karşılama", "B) Bir soruna çözüm bulma", "C) Hayalleri gerçekleştirme", "D) Merak duygusu"], correct: 1, explanation: "Düğmelerin kopması bir 'sorundur'. Cırt cırt bant bu soruna bulunan pratik bir çözümdür." },
            { subject: "Sosyal Bilgiler", text: "Hezarfen Ahmet Çelebi kendi geliştirdiği kanatlarla Galata Kulesi'nden, Üsküdar'a uçmuştur. Buna göre Hezarfen Ahmet Çelebi, hangi ulaşım alanında çalışma yapmıştır?", options: ["A) Hava yolu", "B) Demir yolu", "C) Kara yolu", "D) Deniz yolu"], correct: 0, explanation: "Uçmak, gökyüzünde seyahat etmek 'Hava yolu' ulaşımıyla ilgilidir." },
            { subject: "Sosyal Bilgiler", text: "Eda'nın babaannesi şunları söyledi: 'Eskiden çamaşırları elimizde yıkardık. Ellerimiz saatlerce suyun içinde buruşur, eğilmekten belimiz ağrırdı. Şimdiki insanlar makineye atıp bir iki saatte yıkanmasını sağlıyorlar.'\nÇamaşır makinesinin sağladığı faydalardan hangisi bu metinde vurgulanmıştır?", options: ["A) Sadece zamandan tasarruf sağlama", "B) Günlük işleri kolayca tamamlama ve vücut sağlığını koruma", "C) Sadece maddi tasarruf sağlama", "D) Daha güzel kıyafetler dikme"], correct: 1, explanation: "Babaanne 'iki saatte yıkanıyor' diyerek zamanı ve kolaylığı, 'belimiz ağrırdı' diyerek vücut sağlığını vurgulamıştır." },
            { subject: "Sosyal Bilgiler", text: "1. Teknoloji hastalıkların tedavisini _____\n2. Teknolojik buluşları yapan kişilere _____ denir.\n3. İlk insanlar haberleşme aracı olarak _____ kullanmıştır.\nYukarıdaki boşluklara hangi kelime GETİRİLEMEZ?", options: ["A) Duman", "B) Mucit", "C) Kolaylaştırır", "D) Teleskop"], correct: 3, explanation: "Boşluklara sırasıyla; kolaylaştırır, mucit, duman gelir. Teleskop kelimesi boşta kalır." },
            { subject: "Sosyal Bilgiler", text: "İnsanların hayatını tehdit eden, aniden oluşan ve insan kontrolünde olmayan olaylara doğal afet denir. Buna göre hangisi bir DOĞAL AFET DEĞİLDİR?", options: ["A) Yanardağ patlaması", "B) Toprak kayması", "C) Trafik kazası", "D) Çığ düşmesi"], correct: 2, explanation: "Trafik kazası doğa olaylarından değil, insanların hatalarından kaynaklanan yapay (beşeri) bir tehlikedir." },
            { subject: "Sosyal Bilgiler", text: "Mareşal Fevzi Çakmak, yaşamının yarısını savaş meydanlarında geçirmiş, İzmir'in işgaline karşı durmuş ve verdiği kararlarla Milli Mücadele'nin en önemli isimlerinden biri olmuştur.\nFevzi Çakmak ile ilgili hangisine ULAŞILAMAZ?", options: ["A) Mustafa Kemal'in silah arkadaşıdır.", "B) Türk ordusuna başkomutanlık yapmıştır.", "C) Batı Cephesi'nde görev yapmıştır.", "D) Milli Mücadele'de önemli rol almıştır."], correct: 1, explanation: "Türk ordusunun Başkomutanı Mustafa Kemal Atatürk'tür. Parçada da Fevzi Çakmak'ın başkomutan olduğuna dair bir bilgi yoktur." },
            { subject: "İngilizce", text: "I'm a twelve-year old student from Turkey. The name of my city is Antalya. It's in the south. Jason is my best friend. He's thirteen years old. He's from Britain. He lives in London.\nAşağıdaki sorulardan hangisinin cevabı verilen metinde YOKTUR?", options: ["A) How old is Jason?", "B) Where is Britain?", "C) Who is British?", "D) Is Antalya in Turkey?"], correct: 1, explanation: "Jason 13 yaşında, Jason İngiliz ve Antalya Türkiye'de. Ancak Britanya'nın nerede (Where is Britain) olduğuna dair bilgi yoktur." },
            { subject: "İngilizce", text: "Emre: Can I have twenty-three rulers, eight erasers and thirteen pencils.\nBeyza: Of course.\nEmre'nin bahsettiği eşyaların SAYILARININ TOPLAMI kaçtır?", options: ["A) Thirty-nine (39)", "B) Fourteen (14)", "C) Twenty-six (26)", "D) Forty-four (44)"], correct: 3, explanation: "Twenty-three (23) + eight (8) + thirteen (13) = 44 (Forty-four)." },
            { subject: "İngilizce", text: "Ela: What can you do?\nHakan: I can climb a tree.\nHakan'ın yeteneği aşağıdakilerden hangisidir?", options: ["A) Ağaca tırmanmak", "B) Denizde yüzmek", "C) Bisiklete binmek", "D) Kitap okumak"], correct: 0, explanation: "Climb a tree, İngilizcede 'Ağaca tırmanmak' anlamına gelir." },
            { subject: "İngilizce", text: "Zeynep Ela: \"My city is in the west.\" (Benim şehrim batıdadır.)\nBuna göre Zeynep Ela Türkiye haritasında hangi şehri işaret etmiştir?", options: ["A) Sinop (Kuzey)", "B) Mersin (Güney)", "C) Van (Doğu)", "D) İzmir (Batı)"], correct: 3, explanation: "West 'Batı' demektir. Türkiye'nin batısındaki şehir İzmir'dir." },
            { subject: "İngilizce", text: "Serhat: My name is Serhat.\nTeacher: Nice to meet you, Serhat. ____________?\nSerhat: Turkey.\nÖğretmenin boş bırakılan yerde sorduğu soru hangisidir?", options: ["A) Can I join your game?", "B) May I leave my books here?", "C) Where are you from?", "D) How many balls do you have?"], correct: 2, explanation: "Serhat ülke ismiyle (Turkey) cevap verdiğine göre öğretmen 'Nerelisin?' (Where are you from?) diye sormuştur." }
        ];

        // --- 2. SET: MART AYI 1. DENEME (45 SORU) ---
        const q_mart_1 = [
            { subject: "Türkçe", text: "Toprağa düşen tohumdan, önce fide meydana gelir. Fide, bir yıl sonra fidan halini alır. Hücreler çoğalır, dallar, yapraklar genişlemeye başlar. Böylece ağaç meydana gelmiş olur. Her geçen yıl ağacın gövdesi genişler, ağaç da hem yukarıya doğru hem de yanlara doğru büyür.\n\nBu metinde ağaçlarla ilgili olarak aşağıdakilerden hangisine DEĞİNİLMEMİŞTİR?", options: ["A) Tohumdan fideye dönüştüğünü", "B) Bir yıl içinde fidan olduğunu", "C) Zaman içinde genişleyip uzadığını", "D) İnsanlara birçok yararı olduğunu"], correct: 3, explanation: "Metinde ağacın büyüme evreleri anlatılmış ancak insanlara olan yararından hiç bahsedilmemiştir." },
            { subject: "Türkçe", text: "Kırtasiyelerde bazı anne ve babaları görüyorum. Kitaplara şöyle bir göz atıp, çocukları okusun diye çeşit çeşit kitap alıyorlar. Bu durum çok güzel görünebilir ilk başta; ancak çocuklarının ne tür kitapları sevdiğini bilmeden ve çocuklarının düşüncesine kulak vermeden alınan bu kitaplar, okunmuyor. Sadece kitaplıkları süslüyor.\n\nYukarıdaki metnin ana düşüncesi nedir?", options: ["A) Hiçbir zaman çocuklarımıza kitap almamalıyız.", "B) Kitap alırken çocuklarımızın da düşüncesini sormalıyız.", "C) Kitaplar, okunmasa bile kitaplıklarda süs olarak durmalıdır.", "D) Çocuklar küçük olduğu için kitap seçme işini sadece büyükler yapmalıdır."], correct: 1, explanation: "Yazar, çocukların ilgisini çekmeyen kitapların okunmadığını, bu yüzden onların fikrinin alınması gerektiğini vurguluyor." },
            { subject: "Türkçe", text: "Bilim, sanat, meslek dalıyla ya da bir konuyla ilgili özel ve belirli bir kavramı karşılayan sözcüklere \"terim\" denir.\n\nBuna göre aşağıdaki öğrencilerden hangisi cümlesinde terim anlamlı sözcük kullanmıştır?", options: ["A) Annesi, çocuğu parkta gezdiriyordu.", "B) Marketten, iki ekmek aldım.", "C) Sınavdan önce karnımı güzelce doyurdum.", "D) Müzik dersinde notaları öğrendik."], correct: 3, explanation: "Müzik alanına ait olan 'nota' kelimesi terim anlamlıdır." },
            { subject: "Türkçe", text: "1. İyi bir yaşam için dengeli beslenmeliyiz. (Sağlık)\n2. Her insan mutlu olmalıdır. (Sorumluluk)\n3. Yaşadığımız çevreye evimiz gibi bakmalıyız. (Temizlik)\n4. Her geçen gün yeni icatlar elde ediliyor. (Teknoloji)\n\nNumaralanmış cümlelerden hangisinin konusu YANLIŞ gösterilmiştir?", options: ["A) 1", "B) 2", "C) 3", "D) 4"], correct: 1, explanation: "Her insanın mutlu olması 'Sorumluluk' değil, bir duygu veya haktır. Eşleştirme yanlıştır." },
            { subject: "Türkçe", text: "Berke ve arkadaşları her pazar öğleden sonra büyük parkta buluşurlar. Tam dört saat bıkmadan, usanmadan futbol oynarlar. Parkın geniş futbol sahası sadece pazar öğleden sonraları boş olur. Çocuklar da bu boşluğun tadını doyasıya çıkarırlar. Akşama doğru herkes, kan ter içinde evlerine döner.\n\nBu parçada aşağıdaki sorulardan hangisinin yanıtı YOKTUR?", options: ["A) Kim?", "B) Ne zaman?", "C) Nerede?", "D) Niçin?"], correct: 3, explanation: "Kim? (Berke ve arkadaşları), Ne zaman? (Her pazar öğleden sonra), Nerede? (Büyük parkta). Ancak 'Niçin' sorusunun cevabı yoktur." },
            { subject: "Türkçe", text: "\"Ödevini üstünkörü yapmışsın.\" cümlesindeki altı çizili sözcüğün cümleye kattığı anlam aşağıdakilerden hangisinde YOKTUR?", options: ["A) Dolapları gelişigüzel düzeltmişsin.", "B) Odayı baştan savma toplamışsın.", "C) Perdeleri ılık bir suyla özenle yıkadı.", "D) Çantayı özensizce yerleştirmiş."], correct: 2, explanation: "Üstünkörü; gelişigüzel, baştan savma ve özensizce demektir. 'Özenle' kelimesi bunun zıttıdır." },
            { subject: "Türkçe", text: "Öğrenciler komutlarını kullanarak ve her komutta birer kare ilerleyerek bulundukları yerden çıkacaklardır. Her öğrenci baş harfi ile verilen çıkıştan çıkacağına göre hangisi komutu YANLIŞ oluşturmuştur?", options: ["A) Ata: Doğru komut", "B) Berke: Doğru komut", "C) Cemil: Doğru komut", "D) Deniz: Yanlış komut dizilimi"], correct: 3, explanation: "Görsele ve mantığa göre Deniz'in ok (komut) yönleri hatalıdır." },
            { subject: "Türkçe", text: "Yazın Muğla(1)da kaldığımız otelde yemeklerden; biber dolması (2) pirinç pilavı (3) tavuk döner (4) ve balık çok hoşuma gitmişti.\n\nYukarıda numaralandırılan yay ayraçlardan hangisine bir noktalama işareti GETİRİLEMEZ?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 0, explanation: "Tavuk dönerden sonra 've' bağlacı kullanıldığı için bağlaçtan önce veya sonra virgül konmaz." },
            { subject: "Türkçe", text: "Öğretmenleri Feyza, Derya, Kayra ve Arda'dan birer cümle kurmalarını istemiştir:\n1. Bari bende seninle geleyim.\n2. Konya'ya ne zaman gideceksiniz?\n3. Bugünkü maçta hiç gol atamadım.\n4. Çok sevdiğim çizgi filmi seyrettim bugün.\n\n- Soru cümlesi kuran tek öğrenci Kayra'dır.\n- İlk harfi ünlüyle başlayan öğrenci kurallı cümle kurmamıştır. (Arda)\n- İstek cümlesi kuran öğrenci Derya değildir.\n\nOlumsuz cümleyi kuran öğrenci aşağıdakilerden hangisidir?", options: ["A) Feyza", "B) Arda", "C) Derya", "D) Kayra"], correct: 2, explanation: "Kayra 2. cümleyi kurdu. Derya istek (1. cümle) kurmadığına göre 3. cümleyi kurmuştur. 3. cümle ('hiç gol atamadım') olumsuz bir cümledir. Demek ki Derya olumsuz cümle kurmuştur." },
            { subject: "Türkçe", text: "Aşağıdaki cümlelerden hangisinde ÖZNEL bir yargı vardır?", options: ["A) İstiklal Marşı'nı, Mehmet Akif Ersoy yazmıştır.", "B) İstanbul, tarihî ve doğa güzellikleriyle en güzel şehirdir.", "C) Konya, yüzölçümü bakımından Türkiye'nin en büyük ilidir.", "D) İç Anadolu Bölgesi, karasal iklim görülen bir bölgedir."], correct: 1, explanation: "İstanbul'un 'en güzel şehir' olması kişiden kişiye değişen öznel bir yargıdır." },
            { subject: "Matematik", text: "Grafikte bir öğrencinin deneme sınavında yaptığı doğru sayıları verilmiştir: Matematik 10, Fen bilimleri 14, Türkçe 10, İngilizce 12.\n\nBuna göre aşağıdakilerden hangisi DOĞRUDUR?", options: ["A) En az doğruyu fen bilimleri dersinden yapmıştır.", "B) Toplam 40 doğru yapmıştır.", "C) En çok İngilizce dersinden doğru yapmıştır.", "D) Matematik ile Türkçe dersinden eşit sayıda doğru yapmıştır."], correct: 3, explanation: "Grafiğe göre hem Matematik hem de Türkçe dersinden 10'ar doğru yapmıştır, yani eşittir." },
            { subject: "Matematik", text: "0, 5, 1, 3, 7 rakamları kullanılarak beş basamaklı en büyük ve en küçük sayılar yazılacaktır.\n\nBu iki sayının toplamının sonucu kaç eder?", options: ["A) 85.667", "B) 81.687", "C) 75.310", "D) 73.510"], correct: 0, explanation: "En büyük sayı: 75.310. En küçük sayı: 10.357. Toplamları: 75310 + 10357 = 85.667'dir." },
            { subject: "Matematik", text: "Bir çıkarma işleminde fark 5638, çıkan ise farktan 1365 fazladır.\nBuna göre eksilen sayı aşağıdakilerden hangisidir?", options: ["A) 4.273", "B) 7.003", "C) 10.564", "D) 12.641"], correct: 3, explanation: "Çıkan sayı = 5638 + 1365 = 7003. Eksilen = Çıkan + Fark -> 7003 + 5638 = 12.641." },
            { subject: "Matematik", text: "İki tam daire tamamen boyanmış, üçüncü dairenin ise 6 parçasından 4'ü boyanmıştır.\nYukarıda modellenen kesir sayısı aşağıdakilerden hangisidir?", options: ["A) 2/4", "B) 4/6", "C) 2 tam 2/4", "D) 2 tam 4/6"], correct: 3, explanation: "2 tane tam pasta yediği için 2 tam. Üçüncü pastayı 6'ya bölüp 4'ünü yediği için kesir kısmı 4/6. Sonuç: 2 tam 4/6." },
            { subject: "Matematik", text: "Teraziye 3 adet yumurta kolisi yerleştirilmiş ve toplam ağırlığı 1800 gram gelmiştir. Her kolide 10 adet yumurta bulunmaktadır. Tüm yumurtaların ağırlığı birbirine eşittir. Boş yumurta kolisinin ağırlığı ise 100 gram gelmektedir.\n\nBuna göre 1 adet yumurtanın ağırlığı kaç gramdır?", options: ["A) 40", "B) 50", "C) 60", "D) 70"], correct: 1, explanation: "3 boş koli = 300 gr. Yumurtaların net ağırlığı = 1800 - 300 = 1500 gr. Toplam 30 yumurta var. 1500 / 30 = 50 gram." },
            { subject: "Matematik", text: "Bir kafede Portakal Suyu 6 TL, Çay 2 TL, Limonata 4 TL, Gazoz 5 TL'dir. Bir günde toplam 1854 TL gelir elde edilmiştir.\nBu gelirin 2/9'u limonatadan elde edildiğine göre kaç bardak limonata satılmıştır?", options: ["A) 412", "B) 378", "C) 213", "D) 103"], correct: 3, explanation: "Limonata geliri: 1854 / 9 = 206. 206 x 2 = 412 TL. 1 Limonata 4 TL olduğuna göre: 412 / 4 = 103 bardak satılmıştır." },
            { subject: "Matematik", text: "Aras doğduğunda Yunus 2 yaşındadır. Yunus doğduğunda ise Gökhan 3 yaşındadır.\nAras şuan 7 yaşında olduğuna göre üçünün yaşları toplamı kaçtır?", options: ["A) 28", "B) 24", "C) 21", "D) 18"], correct: 0, explanation: "Aras=7. Yunus Aras'tan 2 yaş büyük=9. Gökhan Yunus'tan 3 yaş büyük=12. Toplam: 7 + 9 + 12 = 28." },
            { subject: "Matematik", text: "Pazartesi günü bir miktar soru çözdüm. 59 soru daha çözmüş olsaydım salı günü çözdüklerimden 28 soru daha fazla çözmüş olacaktım.\nSalı günü 265 soru çözdüğüme göre pazartesi günü çözdüğüm soru sayısı kaçtır?", options: ["A) 293", "B) 254", "C) 234", "D) 185"], correct: 2, explanation: "Pzt + 59 = Salı + 28 -> Pzt + 59 = 265 + 28 -> Pzt + 59 = 293. Pzt = 293 - 59 = 234." },
            { subject: "Matematik", text: "Bir çarpma işleminde birinci çarpan 5A, ikinci çarpan B7'dir. Sonuç 2072 çıkmıştır. (İpucu: 56 x 37 = 2072)\nYandaki çarpma işlemine göre A + B işleminin sonucu kaçtır?", options: ["A) 5", "B) 8", "C) 10", "D) 12"], correct: 1, explanation: "Çarpanlar 56 ve 37'dir. A=6, B=3 (veya görseldeki mantıkla 5+3). Metne göre kare(5) ve yuvarlak(3)'ün toplamı 8'dir." },
            { subject: "Matematik", text: "Bir bölme işleminde bölen 9, bölüm 197'dir.\nBu bölme işleminde bölünen sayı EN ÇOK kaç olabilir?", options: ["A) 1771", "B) 1773", "C) 1775", "D) 1781"], correct: 3, explanation: "Bölen 9 ise kalan en fazla 8 olabilir. Bölünen = (9 x 197) + 8 = 1773 + 8 = 1781." },
            { subject: "Fen Bilimleri", text: "Ahmet ve Sena çerçeveli tahtaya itme kuvveti uyguluyor. Çerçeveli tahta B yönünde (Sena'ya doğru) hareket ettiğine göre aşağıdaki ifadelerden hangisi doğrudur?", options: ["A) Ahmet'in çerçeveli tahtaya uyguladığı kuvvet, Sena'nın uyguladığı kuvvetten fazladır.", "B) Ahmet'in çerçeveli tahtaya uyguladığı kuvvet, Sena'nın uyguladığı kuvvetten azdır.", "C) İkisi de çerçeveli tahtaya eşit kuvvet uygulamıştır.", "D) Sena, çerçeveli tahtaya kuvvet uygulamadığında tahta hareket etmez."], correct: 0, explanation: "Cisim büyük kuvvetin ittiği yöne doğru hareket eder. Tahta Sena'ya doğru gidiyorsa Ahmet'in itme kuvveti daha fazladır." },
            { subject: "Fen Bilimleri", text: "Dünya ile ilgili verilen bilgilerden hangisi YANLIŞTIR?", options: ["A) Dünya'mız Güneş'ten küçüktür.", "B) Güneş etrafındaki dolanımı mevsimleri meydana getirir.", "C) Dünya kendi etrafında dönüşünü ve Güneş etrafındaki bir kez dolanımını aynı sürede tamamlar.", "D) Dünya, kendi ekseni etrafında dönüşünü 24 saatte tamamlar."], correct: 2, explanation: "Dünya kendi etrafındaki dönüşünü 24 saatte (1 gün), Güneş etrafındaki dolanımını 365 gün 6 saatte (1 yıl) tamamlar. İkisi aynı süre değildir." },
            { subject: "Fen Bilimleri", text: "Uygun aydınlatma kuralları:\n- Yapılacak işe uygun parlaklıkta aydınlatma yapılmalıdır.\n- Işık, doğrudan göze gelmemelidir.\n- Aşırı aydınlatma göçmen kuşların yollarını kaybetmesine neden olmaktadır. Bu nedenle aşırı aydınlatma yapmamalıyız.\n- Aydınlatmada kullanılacak aydınlatma teknolojileri yüksek enerji tüketimine neden olmalıdır.\n\nYukarıda uygun aydınlatma ile ilgili verilen açıklamalardan kaç tanesi DOĞRUDUR?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 1, explanation: "İlk 3 ifade doğrudur. 4. ifade yanlıştır çünkü aydınlatma 'düşük' enerji tüketimine (tasarrufa) neden olmalıdır." },
            { subject: "Fen Bilimleri", text: "Şekildeki taş, içinde 50 ml su bulunan dereceli kabın içine atıldığında su seviyesinin 70 ml'ye çıktığı gözlemleniyor.\nBuna göre taş ile ilgili aşağıdaki sonuçlardan hangisine ulaşılabilir?", options: ["A) Taşın hacmi 20 ml'dir.", "B) Taşın kütlesi 20 gramdır.", "C) Taşın hacmi 70 ml'dir.", "D) Taşın kütlesi 70 gramdır."], correct: 0, explanation: "Batan cisimlerin hacmi, taşırdıkları sıvı miktarına eşittir. 70 - 50 = 20 ml taşın hacmidir." },
            { subject: "Fen Bilimleri", text: "Öğretmen, fen bilimleri dersinde öğrencilerine 'Masa lambası ile uygun aydınlatma' konulu proje ödevi vermiştir. \nBuna göre hangi öğrencinin çizimi (ışığın yönü) DOĞRUDUR?", options: ["A) Fazlı (Işık doğrudan göze vuruyor)", "B) Murat (Işık çok zayıf)", "C) Emel (Işık arkadan gelip gölge yapıyor)", "D) Beyza (Işık yukarıdan, doğru açıyla kitabı aydınlatıyor)"], correct: 3, explanation: "Masa lambası kullanırken ışık doğrudan göze gelmemeli, çalışma alanını (kitabı/defteri) yukarıdan veya yandan aydınlatmalıdır." },
            { subject: "Fen Bilimleri", text: "Aşağıdaki ifadelerden hangisi YANLIŞTIR?", options: ["A) Havanın sıvılar gibi belirli bir şekli yoktur.", "B) Gaz halindeki maddeler sıkıştırılabilir.", "C) Tuz konulduğu kabın şeklini almaz.", "D) Katı maddeler dışarıdan bir etki almadıkça şekilleri değişmez."], correct: 2, explanation: "Tuz, şeker, un gibi maddeler 'küçük taneli katılar'dır ve sıvılar gibi konuldukları kabın şeklini ALIRLAR." },
            { subject: "Fen Bilimleri", text: "Hatice Hanım pirinç pilavı yapmak için katı haldeki tereyağını bir kaba koyup ocağın üzerinde ısıtmıştır. Tereyağının geçirdiği değişiklikler için hangisi SÖYLENEMEZ?", options: ["A) Tereyağı ısı vermiştir.", "B) Tereyağı erimiştir.", "C) Tereyağının sıcaklığı artmıştır.", "D) Tereyağı ısı almıştır."], correct: 0, explanation: "Ocağın üzerine konan tereyağı ısı VERMEZ, ocaktan ısı ALIR ve bu sayede erir." },
            { subject: "Fen Bilimleri", text: "Görseldeki araba hareket hâlindeyken trafik lambasında kırmızı ışık yanınca duruyor.\nBuna göre araba hangi hareketleri yapacaktır?", options: ["A) Yavaşlama - Hızlanma", "B) Durma - Yavaşlama", "C) Hızlanma - Durma", "D) Yavaşlama - Durma"], correct: 3, explanation: "Araba kırmızı ışığı görünce önce frene basar (Yavaşlama hareketi) ve en sonunda tamamen durur (Durma hareketi)." },
            { subject: "Fen Bilimleri", text: "Pelin: Demli çaydaki çay yapraklarını ayırmak istiyorum.\nDefne: Düğmelerin içine düşen toplu iğneleri ayırmak istiyorum.\nKayra: Kumun içindeki çakıl taşlarını ayırmak istiyorum.\n\nÖğrenciler sırasıyla hangi ayırma yöntemlerini kullanmalıdır?", options: ["A) Mıknatısla ayırma - Süzme - Eleme", "B) Süzme - Mıknatısla ayırma - Eleme", "C) Süzme - Eleme - Mıknatısla ayırma", "D) Eleme - Mıknatısla ayırma - Süzme"], correct: 1, explanation: "Çay yaprakları 'Süzme' ile, toplu iğneler 'Mıknatıs' ile, kum ve çakıl 'Eleme' ile ayrılır." },
            { subject: "Fen Bilimleri", text: "Gözde tablodan özelliklere göre maddeler seçecektir:\n1. Sıra (Esnek): Kaya(1), Kitap(2), Lastik(3)\n2. Sıra (Kırılgan): Sünger(4), Vazo(5), Silgi(6)\n3. Sıra (Pürüzlü): Ayna(7), Kâğıt(8), Ağaç(9)\n\nGözde'nin seçtiği rakamlarla hangi sayı oluşur?", options: ["A) 359", "B) 347", "C) 258", "D) 169"], correct: 0, explanation: "1. Sıra esnek = Lastik (3). 2. Sıra kırılgan = Vazo (5). 3. Sıra pürüzlü = Ağaç gövdesi (9). Oluşan sayı 359'dur." },
            { subject: "Sosyal Bilgiler", text: "Her çocuğun içinde keşfedilmeyi bekleyen bir ressam, müzisyen veya sporcu vardır. Aileler ve eğitimciler çocukların içindeki bu yönleri bulup ortaya çıkarmalıdır.\nBuna göre aile ve eğitimcilerin üzerine düşen, çocukların hangi yönünü keşfetmeleridir?", options: ["A) İhtiyaçlarını", "B) Yeteneklerini", "C) Korkularını", "D) Fiziksel özelliklerini"], correct: 1, explanation: "Ressam, müzisyen veya sporcu olmak kişisel 'yetenekler' (ilgi alanları) ile ilgilidir." },
            { subject: "Sosyal Bilgiler", text: "Günlük hayatımızda kullandığımız bilgisayar sayesinde; ödevlerimizi yapabilir, oyun oynayabilir ve uzaktaki akrabalarımıza e-posta gönderebiliriz.\nYukarıda verilen bilgilerde bilgisayarın HANGİ ALANDAKİ faydalarına değinilmemiştir?", options: ["A) İletişim", "B) Eğlence", "C) Ulaşım", "D) Eğitim"], correct: 2, explanation: "Ödev (Eğitim), Oyun (Eğlence), E-posta (İletişim). Parçada 'Ulaşım' (seyahat etme) ile ilgili bir bilgi yoktur." },
            { subject: "Sosyal Bilgiler", text: "Berra bilinçli bir tüketicidir. Buna göre Berra'nın bir ürün alırken aşağıdakilerden hangisine öncelik vermesi BEKLENMEZ?", options: ["A) Kalitesinin yüksekliğine", "B) Reklamlarının çok olmasına", "C) İhtiyacının önceliğine", "D) Garantisinin olup olmadığına"], correct: 1, explanation: "Bilinçli tüketici reklamı çok yapılıyor diye o ürünü almaz, kendi bütçesine ve ihtiyacına göre davranır." },
            { subject: "Sosyal Bilgiler", text: "Mustafa Kemal, Kurtuluş Savaşını başlatmak için İstanbul'dan yola çıktı. İlk iş olarak milli bilinci uyandırmaya çalıştı. Daha sonra orduyu komuta ederek Batı Anadolu'nun düşman işgalinden kurtulmasını sağladı.\nVerilen bilgiler aşağıdakilerden hangisi ile İLİŞKİLENDİRİLEMEZ?", options: ["A) Havza Genelgesi", "B) Samsun'a çıkış", "C) Büyük Taarruz", "D) TBMM'nin açılması"], correct: 3, explanation: "İstanbul'dan çıkış (Samsun), Milli bilinci uyandırma (Havza), Batı'yı kurtarması (Büyük Taarruz) ilişkilidir. Ancak paragrafta Meclis'in (TBMM) açılmasına değinilmemiştir." },
            { subject: "Sosyal Bilgiler", text: "George de Mestral'in cırt cırt bantlarını icat etmesinde pantolon düğmelerinin sürekli kopmasından şikayetçi olması etkili oldu.\nBu durumda icatların ortaya çıkmasında aşağıdakilerden hangisi etkili olmuştur?", options: ["A) Temel ihtiyaçları karşılama", "B) Bir soruna çözüm bulma", "C) Hayalleri gerçekleştirme", "D) Merak duygusu"], correct: 1, explanation: "Düğmelerin kopması bir 'sorundur'. Cırt cırt bant bu soruna bulunan pratik bir çözümdür." },
            { subject: "Sosyal Bilgiler", text: "Hezarfen Ahmet Çelebi kendi geliştirdiği kanatlarla Galata Kulesi'nden, Üsküdar'a uçmuştur. Buna göre Hezarfen Ahmet Çelebi, hangi ulaşım alanında çalışma yapmıştır?", options: ["A) Hava yolu", "B) Demir yolu", "C) Kara yolu", "D) Deniz yolu"], correct: 0, explanation: "Uçmak, gökyüzünde seyahat etmek 'Hava yolu' ulaşımıyla ilgilidir." },
            { subject: "Sosyal Bilgiler", text: "Eda'nın babaannesi şunları söyledi: 'Eskiden çamaşırları elimizde yıkardık. Ellerimiz saatlerce suyun içinde buruşur, eğilmekten belimiz ağrırdı. Şimdiki insanlar makineye atıp bir iki saatte yıkanmasını sağlıyorlar.'\nÇamaşır makinesinin sağladığı faydalardan hangisi bu metinde vurgulanmıştır?", options: ["A) Sadece zamandan tasarruf sağlama", "B) Günlük işleri kolayca tamamlama ve vücut sağlığını koruma", "C) Sadece maddi tasarruf sağlama", "D) Daha güzel kıyafetler dikme"], correct: 1, explanation: "Babaanne 'iki saatte yıkanıyor' diyerek zamanı ve kolaylığı, 'belimiz ağrırdı' diyerek vücut sağlığını vurgulamıştır." },
            { subject: "Sosyal Bilgiler", text: "1. Teknoloji hastalıkların tedavisini _____\n2. Teknolojik buluşları yapan kişilere _____ denir.\n3. İlk insanlar haberleşme aracı olarak _____ kullanmıştır.\nYukarıdaki boşluklara hangi kelime GETİRİLEMEZ?", options: ["A) Duman", "B) Mucit", "C) Kolaylaştırır", "D) Teleskop"], correct: 3, explanation: "Boşluklara sırasıyla; kolaylaştırır, mucit, duman gelir. Teleskop kelimesi boşta kalır." },
            { subject: "Sosyal Bilgiler", text: "İnsanların hayatını tehdit eden, aniden oluşan ve insan kontrolünde olmayan olaylara doğal afet denir. Buna göre hangisi bir DOĞAL AFET DEĞİLDİR?", options: ["A) Yanardağ patlaması", "B) Toprak kayması", "C) Trafik kazası", "D) Çığ düşmesi"], correct: 2, explanation: "Trafik kazası doğa olaylarından değil, insanların hatalarından kaynaklanan yapay (beşeri) bir tehlikedir." },
            { subject: "Sosyal Bilgiler", text: "Mareşal Fevzi Çakmak, yaşamının yarısını savaş meydanlarında geçirmiş, İzmir'in işgaline karşı durmuş ve verdiği kararlarla Milli Mücadele'nin en önemli isimlerinden biri olmuştur.\nFevzi Çakmak ile ilgili hangisine ULAŞILAMAZ?", options: ["A) Mustafa Kemal'in silah arkadaşıdır.", "B) Türk ordusuna başkomutanlık yapmıştır.", "C) Batı Cephesi'nde görev yapmıştır.", "D) Milli Mücadele'de önemli rol almıştır."], correct: 1, explanation: "Türk ordusunun Başkomutanı Mustafa Kemal Atatürk'tür. Parçada da Fevzi Çakmak'ın başkomutan olduğuna dair bir bilgi yoktur." },
            { subject: "İngilizce", text: "I'm a twelve-year old student from Turkey. The name of my city is Antalya. It's in the south. Jason is my best friend. He's thirteen years old. He's from Britain. He lives in London.\nAşağıdaki sorulardan hangisinin cevabı verilen metinde YOKTUR?", options: ["A) How old is Jason?", "B) Where is Britain?", "C) Who is British?", "D) Is Antalya in Turkey?"], correct: 1, explanation: "Jason 13 yaşında, Jason İngiliz ve Antalya Türkiye'de. Ancak Britanya'nın nerede (Where is Britain) olduğuna dair bilgi yoktur." },
            { subject: "İngilizce", text: "Emre: Can I have twenty-three rulers, eight erasers and thirteen pencils.\nBeyza: Of course.\nEmre'nin bahsettiği eşyaların SAYILARININ TOPLAMI kaçtır?", options: ["A) Thirty-nine (39)", "B) Fourteen (14)", "C) Twenty-six (26)", "D) Forty-four (44)"], correct: 3, explanation: "Twenty-three (23) + eight (8) + thirteen (13) = 44 (Forty-four)." },
            { subject: "İngilizce", text: "Ela: What can you do?\nHakan: I can climb a tree.\nHakan'ın yeteneği aşağıdakilerden hangisidir?", options: ["A) Ağaca tırmanmak", "B) Denizde yüzmek", "C) Bisiklete binmek", "D) Kitap okumak"], correct: 0, explanation: "Climb a tree, İngilizcede 'Ağaca tırmanmak' anlamına gelir." },
            { subject: "İngilizce", text: "Zeynep Ela: \"My city is in the west.\" (Benim şehrim batıdadır.)\nBuna göre Zeynep Ela Türkiye haritasında hangi şehri işaret etmiştir?", options: ["A) Sinop (Kuzey)", "B) Mersin (Güney)", "C) Van (Doğu)", "D) İzmir (Batı)"], correct: 3, explanation: "West 'Batı' demektir. Türkiye'nin batısındaki şehir İzmir'dir." },
            { subject: "İngilizce", text: "Serhat: My name is Serhat.\nTeacher: Nice to meet you, Serhat. ____________?\nSerhat: Turkey.\nÖğretmenin boş bırakılan yerde sorduğu soru hangisidir?", options: ["A) Can I join your game?", "B) May I leave my books here?", "C) Where are you from?", "D) How many balls do you have?"], correct: 2, explanation: "Serhat ülke ismiyle (Turkey) cevap verdiğine göre öğretmen 'Nerelisin?' (Where are you from?) diye sormuştur." }
        ];

        // --- 3. SET: MART AYI 2. DENEME (45 SORU) ---
        const q_mart_2 = [
            { subject: "Türkçe", text: "İnsan, toplum içinde yaşayan bir varlıktır. Tek başına yaşayamaz. Toplum içinde yaşadığı için de bazı kurallara uymak zorundadır. Okulda, çarşıda, otobüste, sinemada hep başka insanlarla iç içe yaşarız. Bu yüzden diğer insanların haklarını gözetmeli, onları rahatsız etmemeliyiz. Toplum kurallarına uyan insan, medeni ve mutlu insandır.\n\nBu metinde aşağıdaki öğütlerden hangisi verilmektedir?", options: ["A) İnsanlara güler yüzle bakmalıyız.", "B) Toplum kurallarına uymalıyız.", "C) Mutlu olmak için çalışmalıyız.", "D) Kişisel bakımımıza özen göstermeliyiz."], correct: 1, explanation: "Metnin bütününde insanların birlikte yaşaması ve birbirlerinin haklarına saygı gösterip kurallara uyması gerektiği öğütlenmektedir." },
            { subject: "Türkçe", text: "Kırtasiyelerde bazı anne ve babaları görüyorum. Kitaplara şöyle bir göz atıp, çocukları okusun diye çeşit çeşit kitap alıyorlar. Bu durum çok güzel görünebilir ilk başta; ancak çocuklarının ne tür kitapları sevdiğini bilmeden ve çocuklarının düşüncesine kulak vermeden alınan bu kitaplar, okunmuyor. Sadece kitaplıkları süslüyor.\n\nYukarıdaki metnin ana düşüncesi cümlesi OLAMAZ?", options: ["A) Çocuklarımıza kitap almalıyız ancak onların fikirleri oldukça önemlidir.", "B) Kitap alırken çocuklarımızın da düşüncesini sormalıyız.", "C) Kitapları çocuklarımızın fikrini sormadan alırsak süs olarak kalabilir.", "D) Çocuklar küçük olduğu için kitap seçme işini sadece büyükler yapmalıdır."], correct: 3, explanation: "Yazar, tam tersine, kitap seçerken çocukların düşüncesine kulak verilmesi gerektiğini savunuyor." },
            { subject: "Türkçe", text: "Bilim, sanat, meslek dalıyla ya da bir konuyla ilgili özel ve belirli bir kavramı karşılayan sözcüklere \"terim\" denir.\n\nBuna göre aşağıdaki öğrencilerden hangisi cümlesinde terim anlamlı sözcük KULLANMAMIŞTIR?", options: ["A) Matematik dersinde üçgen konusunu tam anlamadım.", "B) Futbol maçında iki gol birden attım.", "C) Müzik dersinde notaları öğrendik.", "D) Sınavdan önce karnımı güzelce doyurdum."], correct: 3, explanation: "A şıkkında 'üçgen', B şıkkında 'gol', C şıkkında 'nota' kelimeleri terimdir. D şıkkında terim yoktur." },
            { subject: "Türkçe", text: "1. İyi bir yaşam için dengeli beslenmeliyiz. (Teknoloji)\n2. Okumak insana her zaman huzur verir. (Eğitim)\n3. Yaşadığımız çevreye evimiz gibi bakmalıyız. (İletişim)\n4. Her geçen gün yeni icatlar elde ediliyor. (Sağlık)\n\nNumaralanmış cümlelerden hangisinin konusu DOĞRU gösterilmiştir?", options: ["A) 1", "B) 2", "C) 3", "D) 4"], correct: 1, explanation: "Okumak ve huzur bulmak 'Eğitim/Kültür' ile ilgilidir. Diğerlerinin eşleştirmesi yanlıştır (Örn: İcatlar Teknoloji olmalıydı)." },
            { subject: "Türkçe", text: "Aşağıdaki cümlelerin hangisinde altı çizili sözcük eş sesli (sesteş) dir?", options: ["A) İçimde müthiş bir sevinç var.", "B) Mutluluk kişiden kişiye değişir.", "C) İyi haberi duyunca yüzü güldü.", "D) Onun gidişi bize üzüntü verdi."], correct: 2, explanation: "Yüz kelimesi eş seslidir (Sayı olan yüz, surat olan yüz, yüzmek eylemi)." },
            { subject: "Türkçe", text: "\"Ödevini üstünkörü yapmışsın.\" cümlesindeki altı çizili sözcüğün cümleye kattığı anlam aşağıdakilerden hangisinde VARDIR?", options: ["A) Dolapları güzelce düzeltmişsin.", "B) Perdeleri ılık bir suyla özenle yıkadı.", "C) Odayı baştan savma toplamışsın.", "D) Çantayı titiz bir şekilde yerleştirdi."], correct: 2, explanation: "Üstünkörü; baştan savma, gelişigüzel, özensizce demektir." },
            { subject: "Türkçe", text: "Öğrenciler komutlarını kullanarak ve her komutta birer kare ilerleyerek bulundukları yerden çıkacaklardır. Her öğrenci baş harfi ile verilen çıkıştan çıkacağına göre hangisi komutu YANLIŞ oluşturmuştur?", options: ["A) Ata: Doğru komut", "B) Berke: Doğru komut", "C) Cemil: Yanlış komut", "D) Deniz: Doğru komut"], correct: 2, explanation: "Görsel komut tablosuna göre Cemil'in ok yönleri hatalı olarak verilmiştir." },
            { subject: "Türkçe", text: "Yazın Muğla(1)da kaldığımız otelde yemeklerden; biber dolması (2) pirinç pilavı (3) tavuk döner ve balık (4) çok hoşuma gitmişti.\n\nYukarıda numaralandırılan yay ayraçlardan () hangisine bir noktalama işareti GETİRİLEMEZ?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 0, explanation: "'Tavuk döner ve balık' kısmında 've' bağlacı kullanılmıştır. Bağlaçlardan önce veya sonra virgül konmaz." },
            { subject: "Türkçe", text: "Öğretmenleri Feyza, Derya, Kayra ve Arda'dan birer cümle kurmalarını istemiştir:\n1. Yarınki maça geleceğim siyah beyaz formamı giyip.\n2. Ona bunu yapmaması için çok dil döktüm.\n3. Bana pembe elbiseni ödünç verebilir misin?\n4. Çok sevdiğim çizgi filmi seyrettim bugün.\n\n- Soru cümlesi kuran tek öğrenci Derya'dır.\n- İlk harfi ünlüyle başlayan öğrenci kurallı cümle kurmamıştır. (Arda)\n- Cümlesinde deyim kullanan öğrenci Kayra değildir.\n\nCümlesinde deyim kullanan öğrenci aşağıdakilerden hangisidir?", options: ["A) Feyza", "B) Arda", "C) Derya", "D) Kayra"], correct: 0, explanation: "Dil dökmek bir deyimdir (2. cümle). Derya 3'ü (Soru), Arda 4'ü kurdu. Kayra deyim kullanmadığına göre Feyza 2. cümleyi kurmuştur." },
            { subject: "Türkçe", text: "Yukarıdaki bilgilere göre Kayra'nın kurmuş olduğu cümle aşağıdakilerden hangisidir?", options: ["A) Yarınki maça geleceğim siyah beyaz formamı giyip.", "B) Ona bunu yapmaması için çok dil döktüm.", "C) Bana pembe elbiseni ödünç verebilir misin?", "D) Çok sevdiğim çizgi filmi seyrettim bugün."], correct: 3, explanation: "Feyza(2), Derya(3), Arda(1-ünlü harf). Geriye Kayra için 4. cümle kalır." },
            { subject: "Matematik", text: "Grafikte bir öğrencinin deneme sınavında yaptığı doğru sayıları verilmiştir: Matematik 10, Fen bilimleri 14, Türkçe 10, İngilizce 12.\n\nBuna göre aşağıdakilerden hangisi YANLIŞTIR?", options: ["A) En çok doğruyu fen bilimleri dersinden yapmıştır.", "B) Toplam 46 doğru yapmıştır.", "C) İngilizce dersinin doğru sayısı fen bilimleri dersinden 2 fazladır.", "D) Matematik ile Türkçe dersinden eşit sayıda doğru yapmıştır."], correct: 2, explanation: "İngilizce (12), Fen Bilimleri (14). İngilizce Fen'den 2 fazla değil, 2 eksiktir." },
            { subject: "Matematik", text: "9, 1, 0, 5, 8 rakamları kullanılarak beş basamaklı en büyük ve en küçük sayı yazılacaktır.\n\nBu iki sayının toplamının sonucu kaç eder?", options: ["A) 109.099", "B) 109.089", "C) 108.099", "D) 108.089"], correct: 0, explanation: "En büyük: 98.510. En küçük (0 başa gelemez): 10.589. Toplamları = 109.099" },
            { subject: "Matematik", text: "Bir çıkarma işleminde fark 11.089, çıkan ise farktan 3.978 fazladır.\nBuna göre eksilen sayı aşağıdakilerden hangisidir?", options: ["A) 24.248", "B) 24.156", "C) 25.248", "D) 26.156"], correct: 3, explanation: "Çıkan = 11.089 + 3.978 = 15.067. Eksilen = Çıkan + Fark -> 15.067 + 11.089 = 26.156" },
            { subject: "Matematik", text: "İki tam daire tamamen boyanmış, üçüncü dairenin ise 6 parçasından 5'i boyanmıştır.\nYukarıda modellenen kesir sayısı aşağıdakilerden hangisidir?", options: ["A) 2/4", "B) 4/6", "C) 2 tam 6/5", "D) 2 tam 5/6"], correct: 3, explanation: "2 tane tam kısım var. 3. kısım 6 eş parçaya bölünüp 5'i taranmış. Sonuç: 2 tam 5/6." },
            { subject: "Matematik", text: "Teraziye 3 adet yumurta kolisi yerleştirilmiş ve toplam ağırlığı 981 gram gelmiştir. Her kolide 10 adet yumurta bulunmaktadır. Boş koli ağırlığı 57 gramdır.\n\nBuna göre 20 adet yumurtanın ağırlığı kaç gramdır?", options: ["A) 440", "B) 540", "C) 560", "D) 670"], correct: 1, explanation: "3 boş koli = 171 gr. Yumurtaların net ağırlığı = 981 - 171 = 810 gr. Toplam 30 yumurta var. 1 yumurta = 810 / 30 = 27 gr. 20 yumurta = 20 * 27 = 540 gram." },
            { subject: "Matematik", text: "Bir kafede Portakal Suyu 6 TL, Çay 2 TL, Limonata 4 TL, Gazoz 5 TL'dir. Bir günde ürünlerin satışından toplam 2781 TL gelir elde edilmiştir.\nBu gelirin 4/9'u limonatadan elde edildiğine göre kaç bardak limonata satılmıştır?", options: ["A) 203", "B) 204", "C) 205", "D) 309"], correct: 3, explanation: "Limonata geliri: (2781 / 9) * 4 = 309 * 4 = 1236 TL. 1 Limonata 4 TL ise: 1236 / 4 = 309 bardak satılmıştır." },
            { subject: "Matematik", text: "Aras doğduktan 4 yıl sonra Yunus doğmuştur. Gökhan Aras'tan 4 yıl önce doğmuştur.\nAras şuan 9 yaşında olduğuna göre üçünün yaşları toplamı kaçtır?", options: ["A) 27", "B) 26", "C) 25", "D) 24"], correct: 0, explanation: "Aras=9. Yunus 4 yıl sonra doğduğu için ondan 4 yaş küçük=5. Gökhan 4 yıl önce doğduğu için ondan 4 yaş büyük=13. Toplam: 9+5+13=27." },
            { subject: "Matematik", text: "Pazartesi günü bir miktar soru çözdüm. 73 soru daha çözmüş olsaydım salı günü çözdüklerimden 59 soru daha fazla çözmüş olacaktım.\nSalı günü 189 soru çözdüğüme göre pazartesi günü çözdüğüm soru sayısı kaçtır?", options: ["A) 165", "B) 170", "C) 175", "D) 180"], correct: 2, explanation: "Pzt + 73 = Salı + 59 -> Pzt + 73 = 189 + 59 = 248. Pzt = 248 - 73 = 175." },
            { subject: "Matematik", text: "Bir çarpma işleminde birinci çarpan ve ikinci çarpan çarpıldığında; 1. satır 392, 2. satır 168 çıkmış ve sonuç 2072 bulunmuştur.\nYandaki çarpma işleminde verilmeyen sayılara göre A + B (kutu + daire) işleminin sonucu kaçtır?", options: ["A) 10", "B) 15", "C) 20", "D) 25"], correct: 1, explanation: "Çarpanlar 56 ve 37'dir. Sayılar yerine konulduğunda toplamları 15 çıkar." },
            { subject: "Matematik", text: "Bir bölme işleminde bölen 10, bölüm 2908 dir.\nBu bölme işleminde bölünen sayı en çok kaç olabilir?", options: ["A) 28071", "B) 28089", "C) 29071", "D) 29089"], correct: 3, explanation: "Bölen 10 ise kalan en fazla 9 olabilir. Bölünen = (10 x 2908) + 9 = 29080 + 9 = 29089." },
            { subject: "Fen Bilimleri", text: "Ahmet ve Sena çerçeveli tahtaya itme kuvveti uyguluyor. Çerçeveli tahta B yönünde (Ahmet'in ittiği yöne) hareket ettiğine göre aşağıdaki ifadelerden hangisi DOĞRUDUR?", options: ["A) Ahmet'in uyguladığı kuvvet, Sena'nınkinden azdır.", "B) Sena'nın uyguladığı kuvvet, Ahmet'in uyguladığı kuvvetten azdır.", "C) İkisi de çerçeveli tahtaya eşit kuvvet uygulamıştır.", "D) Sena kuvvet uygulamadığında tahta hareket etmez."], correct: 1, explanation: "Cisim büyük kuvvetin ittiği yöne doğru hareket eder. Tahta Ahmet'in ittiği yöne (B) gidiyorsa Ahmet daha güçlü itmiş, Sena'nın kuvveti az kalmıştır." },
            { subject: "Fen Bilimleri", text: "Dünya ile ilgili verilen bilgilerden hangisi DOĞRUDUR?", options: ["A) Dünya'mız Güneş'ten büyüktür.", "B) Güneş etrafındaki dolanımı ile gece gündüz meydana getirir.", "C) Dünya kendi etrafında dönüşünü 24 saatte, Güneş etrafındaki dönüşünü 365 gün 6 saatte tamamlar.", "D) Dünya, kendi ekseni etrafında dönüşünü 24 saatte tamamlar. (Eksik bilgi)"], correct: 2, explanation: "Dünya kendi etrafındaki dönüşünü 24 saatte (1 gün), Güneş etrafındaki dolanımını 365 gün 6 saatte (1 yıl) tamamlar. Doğru olan C şıkkıdır." },
            { subject: "Fen Bilimleri", text: "- Yapılacak işe uygun parlaklıkta aydınlatma yapılmalıdır.\n- Işık, doğrudan göze gelmelidir.\n- Aşırı aydınlatma göçmen kuşların yollarını bulmalarına yardımcı olmaktadır.\n- Aydınlatmada yüksek enerji tüketimine neden olmalıdır.\nYukarıda uygun aydınlatma ile ilgili verilen açıklamalardan kaç tanesi DOĞRUDUR?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 3, explanation: "Sadece 1. madde doğrudur. Işık doğrudan göze gelME-melidir. Aşırı aydınlatma kuşlara ZARAR verir. Yüksek değil, DÜŞÜK enerji tüketimi olmalıdır." },
            { subject: "Fen Bilimleri", text: "Şekildeki taş, içinde 50 ml su bulunan dereceli kabın içine atıldığında su seviyesinin 60 ml'ye çıktığı gözlemleniyor.\nBuna göre taş ile ilgili aşağıdaki sonuçlardan hangisine ulaşılabilir?", options: ["A) Taşın hacmi 20 ml'dir.", "B) Taşın kütlesi 10 gramdır.", "C) Taşın hacmi 10 ml'dir.", "D) Taşın kütlesi 60 gramdır."], correct: 2, explanation: "Batan cisimlerin hacmi, taşırdıkları sıvı miktarına eşittir. 60 - 50 = 10 ml taşın hacmidir." },
            { subject: "Fen Bilimleri", text: "Öğrenciler masa lambası aydınlatması çizimlerini yapmışlardır. Kaç öğrenci YANLIŞ çizim yapmıştır? (Sadece Beyza ışığı doğru yönden vermiştir)", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 1, explanation: "3 Öğrenci (Fazlı, Murat, Emel) yanlış çizim yapmıştır. Biri göze tutmuş, biri çok zayıf aydınlatmış, biri ise gölge yapacak şekilde arkadan tutmuştur." },
            { subject: "Fen Bilimleri", text: "Aşağıdaki ifadelerden hangisi DOĞRUDUR?", options: ["A) Gaz halindeki maddeler sıkıştırılabilir.", "B) Havanın sıvılar gibi belirli bir şekli vardır.", "C) Tuz konulduğu kabın şeklini almaz.", "D) Katı maddeler dışarıdan bir etki almasa da şekilleri değişir."], correct: 0, explanation: "Gazların belirli bir şekli ve hacmi yoktur, bu yüzden kapalı kaplarda sıkıştırılabilirler (örneğin tüpgaz, deodorant)." },
            { subject: "Fen Bilimleri", text: "Hatice Hanım tereyağını kaba koyup ocağın üzerinde yakmıştır.\nBuna göre, tereyağının geçirdiği değişiklikler için aşağıdakilerden hangisi SÖYLENEBİLİR?", options: ["A) Tereyağı ısı vermiştir.", "B) Tereyağı katılaşır.", "C) Tereyağının sıcaklığı azalmıştır.", "D) Tereyağı ısı almıştır."], correct: 3, explanation: "Ocağın üzerine konan tereyağı ocaktan ısı ALIR, bu sayede sıcaklığı artar ve erir." },
            { subject: "Fen Bilimleri", text: "Araba hareket hâlindeyken trafik lambasında kırmızı ışık yanınca duruyor.\nBuna göre araba hangi hareketleri yapacaktır?", options: ["A) Yavaşlama - Hızlanma", "B) Durma - Yavaşlama", "C) Yavaşlama - Durma", "D) Hızlanma - Durma"], correct: 2, explanation: "Araba kırmızı ışığı görünce önce frene basarak Yavaşlama hareketi yapar, en sonunda tamamen Durma hareketi yapar." },
            { subject: "Fen Bilimleri", text: "Pelin: Kumun içindeki çakıl taşları.\nDefne: Plastik düğme içindeki toplu iğneler.\nKayra: Demli çaydaki çay parçaları.\nÖğrenciler sırasıyla hangi ayırma yöntemlerini kullanmalıdır?", options: ["A) Mıknatısla - Süzme - Eleme", "B) Süzme - Mıknatısla - Eleme", "C) Süzme - Eleme - Mıknatısla", "D) Eleme - Mıknatısla - Süzme"], correct: 3, explanation: "Kum ve çakıl taşları (büyüklük farkı) Eleme yöntemiyle ayrılır. Toplu iğneler demir olduğu için Mıknatısla ayrılır. Çay ise Süzme yöntemiyle ayrılır." },
            { subject: "Fen Bilimleri", text: "Gözde'nin seçimi:\nI. sıra (Esnek): Kaya(4), Kitap(5), Lastik(6) -> Lastik esnektir.\nII. sıra (Kırılgan): Sünger(7), Vazo(8), Silgi(9) -> Vazo kırılgandır.\nIII. sıra (Pürüzlü): Ayna(1), Kağıt(2), Ağaç(3) -> Ağaç pürüzlüdür.\nBu eşleştirmeye göre şifre kaçtır?", options: ["A) 159", "B) 359", "C) 258", "D) 357"], correct: 1, explanation: "Esnek=Lastik(3), Kırılgan=Vazo(5), Pürüzlü=Ağaç(9). Şifre: 359." },
            { subject: "Sosyal Bilgiler", text: "Her çocuğun içinde keşfedilmeyi bekleyen bir ressam, müzisyen veya sporcu vardır. Aileler ve eğitimciler çocukların içindeki bu yönleri bulup ortaya çıkarmalıdır.\nBuna göre aile ve eğitimcilerin üzerine düşen çocukların hangi yönünü keşfetmeleridir?", options: ["A) İhtiyaçlarını", "B) Yeteneklerini", "C) Korkularını", "D) Fiziksel özelliklerini"], correct: 1, explanation: "Ressam, müzisyen veya sporcu olmak kişisel 'yetenekler' ve beceriler ile ilgilidir." },
            { subject: "Sosyal Bilgiler", text: "Bilgisayar kullanarak ödevlerimizi yapabilir, oyun oynayabiliriz. Ayrıca uzaktaki akrabalarımızla görüşebilir onlara elektronik posta gönderebiliriz.\nYukarıda verilen bilgilerde bilgisayarın hangi alanlardaki faydalarına DEĞİNİLMEMİŞTİR?", options: ["A) İletişim", "B) Eğlence", "C) Ulaşım", "D) Eğitim"], correct: 2, explanation: "Ödev (Eğitim), Oyun (Eğlence), E-posta/Görüşmek (İletişim). Parçada seyahat ve Ulaşım'a değinilmemiştir." },
            { subject: "Sosyal Bilgiler", text: "Berra bilinçli bir tüketicidir. Buna göre Berra'nın ürün alırken aşağıdakilerden (1-Kalite, 2-Reklam, 3-İhtiyaç, 4-Garanti) kaç tanesine dikkat etmesi beklenir?", options: ["A) 4", "B) 3", "C) 2", "D) 1"], correct: 1, explanation: "Bilinçli tüketici Kaliteye, İhtiyacına ve Garantiye (3 tane) dikkat eder. Sadece reklamı çok diye (2. madde) almaz." },
            { subject: "Sosyal Bilgiler", text: "Mustafa Kemal, Kurtuluş Savaşını başlatmak için İstanbul'dan yola çıktı. İlk iş olarak milli bilinci uyandırdı. Orduları komuta etti.\nVerilen bilgiler aşağıdakilerden hangisi ile İLİŞKİLENDİRİLEMEZ?", options: ["A) Havza Genelgesi", "B) Samsun'a çıkış", "C) Büyük Taarruz", "D) TBMM'nin açılması"], correct: 3, explanation: "Paragrafta Meclis'in (TBMM) açılmasına değinilmemiştir." },
            { subject: "Sosyal Bilgiler", text: "Cırt cırt bantların icat edilmesinde; I. Temel ihtiyaçları karşılama, II. Soruna çözüm bulma, III. Hayalleri gerçekleştirme.\nHangilerinin etkili olduğu SÖYLENEMEZ?", options: ["A) Yalnız I", "B) Yalnız II", "C) I ve III", "D) I, II ve III"], correct: 2, explanation: "Cırt cırt bantlar kopan düğme sorununa bir çözüm olarak bulunmuştur. Bir hayal veya temel bir ihtiyaç değildi. I ve III söylenemez." },
            { subject: "Sosyal Bilgiler", text: "Hezarfen Ahmet Çelebi kendi geliştirdiği kanatlarla Galata Kulesi'nden, Üsküdar'a uçmuştur. Hangi ulaşım alanında çalışma yapmıştır?", options: ["A) Hava yolu", "B) Demir yolu", "C) Kara yolu", "D) Deniz yolu"], correct: 0, explanation: "Uçmak, gökyüzünde süzülmek 'Hava yolu' ulaşımıyla ilgilidir." },
            { subject: "Sosyal Bilgiler", text: "Eda'nın babaannesi çamaşır makinesi için: 'Bir iki saatte yıkanıyor, eskiden elimizde yıkardık, belimiz ağrırdı.' demiştir.\nTeknolojinin hangi faydasını ÖN PLANA ÇIKARMAZ?", options: ["A) Yalnız I", "B) I ve II", "C) II ve III", "D) I, II ve III"], correct: 0, explanation: "Babaanne işin kolaylığından ve 'belimiz ağrırdı' diyerek vücut sağlığından bahsetmiştir. Sadece zaman tasarrufunu ön plana çıkarmaz." },
            { subject: "Sosyal Bilgiler", text: "Deren(Gitar), Sinem(Basket topu), Hasan(Ayakkabı), Suat(Tenis raketi) istemiştir. İhtiyaçlara öncelik veren baba hangisini almalıdır?", options: ["A) Deren", "B) Sinem", "C) Hasan", "D) Suat"], correct: 2, explanation: "Gitar, top veya raket istek (hobi) iken; ayakkabı giyinme gibi temel bir zorunlu İHTİYAÇ tır." },
            { subject: "Sosyal Bilgiler", text: "M. Kemal için; 1. Askeri okul, 2. Trablusgarp, 3. Anafartalar, 4. 19 Mayıs'ta Anadolu'ya geçti ve işgalden kurtulmaya öncülük etti.\nHangisinde Milli Mücadele'deki önemine değinilmiştir?", options: ["A) 1", "B) 2", "C) 3", "D) 4"], correct: 3, explanation: "Milli Mücadele (Kurtuluş Savaşı), 19 Mayıs'ta Anadolu'ya (Samsun) geçmesiyle başlamış ve onun öncülüğünde yürütülmüştür (4. Madde)." },
            { subject: "Sosyal Bilgiler", text: "Mareşal Fevzi Çakmak ile ilgili aşağıdakilerden hangisine ULAŞILAMAZ?", options: ["A) Mustafa Kemal'in silah arkadaşları arasında yer almıştır.", "B) En büyük başarıları kazandığı cephe güney cephesidir.", "C) Batı Cephesi'nde görev yapmıştır.", "D) Milli Mücadele'nin başarıya ulaşmasında önemli rol almıştır."], correct: 1, explanation: "Metinde Fevzi Çakmak'ın en büyük başarılarını Güney Cephesi'nde kazandığına dair bir bilgi geçmemektedir." },
            { subject: "İngilizce", text: "I'm a twelve-year old student from Turkey. The name of my city is Antalya. It's in the south. Jason is my best friend. He's thirteen years old. He's from Britain. He lives in London.\n\nAşağıdaki sorulardan hangisinin cevabı verilen metin içerisinde GEÇMEMEKTEDİR?", options: ["A) How old is Jason?", "B) Where is Britain?", "C) Who is British?", "D) Is Antalya in Turkey?"], correct: 1, explanation: "Jason 13 yaşında, Jason İngiliz ve Antalya Türkiye'de. Ancak Britanya'nın nerede (Where is Britain) olduğuna dair bilgi yoktur." },
            { subject: "İngilizce", text: "Emre: Can I have twenty five rulers, nine erasers and fourteen pencils.\nBeyza: Of course.\nEmre'nin bahsettiği sayıların toplamı kaçtır?", options: ["A) thirty nine", "B) fourteen", "C) twenty six", "D) forty eight"], correct: 3, explanation: "Twenty-five (25) + nine (9) + fourteen (14) = 48 (Forty-eight). (Not: Çeviride 48 şıkkı D olarak düzenlenmiştir)." },
            { subject: "İngilizce", text: "Ela: What can you do?\nHakan: I can sing a song.\nBu eylemi (şarkı söylemek) gösteren şık hangisidir?", options: ["A) Play football", "B) Ride a bike", "C) Sing a song", "D) Climb a tree"], correct: 2, explanation: "Sing a song, İngilizcede 'şarkı söylemek' demektir." },
            { subject: "İngilizce", text: "Zeynep Ela: \"Where is Zeynep Ela from? My city is in the east.\"\n(İzmir-Batı, Sinop-Kuzey, Van-Doğu, Mersin-Güney)\nBuna göre Zeynep Ela hangi şehirdendir?", options: ["A) Sinop", "B) Mersin", "C) Van", "D) İzmir"], correct: 2, explanation: "East 'Doğu' demektir. Türkiye'nin doğusundaki şehir Van'dır." },
