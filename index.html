            { subject: "Türkçe", text: "(I) istiyorsanız (II) öneririm (III) kitap (IV) gençlere (V) örnek olmak (VI) okumanızı\nYukarıda karışık olarak verilmiş sözcüklerle anlamlı ve kurallı bir cümle oluşturmak istersek doğru sıralama nasıl olmalıdır?", options: ["A) III-VI-II-IV-V-I", "B) VI-II-IV-V-I-III", "C) IV-V-I-III-VI-II", "D) V-I-IV-III-VI-II"], correct: 2, explanation: "Kurallı cümle: 'Gençlere(IV) örnek olmak(V) istiyorsanız(I) kitap(III) okumanızı(VI) öneririm(II).' -> IV - V - I - III - VI - II" },
            { subject: "Türkçe", text: "Keloğlan, köyünün yolunu bulabilmesi için 'ünlü düşmesinin' yer aldığı cümlenin olduğu yolu takip edecektir. Buna göre Keloğlan hangi cümleyi seçmelidir?", options: ["A) Maçta omzumdan sakatlandığımı anladım.", "B) Sabah kalktığımda kendimi kötü hissediyorum.", "C) Ünlü maceracı, kayıp kıtayı aradığını söyledi.", "D) Bu kentin sokakları, hep bir hüzün verir bana."], correct: 0, explanation: "A şıkkında 'omuz' kelimesine '-um' eki gelince 'u' harfi düşmüş ve 'omzum' olmuştur (Ünlü düşmesi)." },
            { subject: "Türkçe", text: "\"Bir limon ağacı( ) her yıl yaprak döker( ) bir çam ağacı( ) iki yılda bir yaprak döker( )\"\nYukarıdaki cümlede parantezlere sırasıyla hangi noktalama işaretleri gelmelidir?", options: ["A) (,) (;) (,) (.)", "B) (,) (,) (,) (.)", "C) (:) (!) (.) (,)", "D) (?) (:) (;) (.)"], correct: 0, explanation: "Sıralı ve içinde virgül bulunan cümleleri ayırmak için noktalı virgül (;) kullanılır. 'Bir limon ağacı, her yıl yaprak döker; bir çam ağacı, iki yılda bir yaprak döker.'" },
            { subject: "Matematik", text: "Serra: \"Benim okul numaram 984.673 sayısındaki yüz binler ve yüzler basamağındaki rakamların sayı değerlerinin toplamına eşittir.\" Buna göre Serra'nın okul numarası kaçtır?", options: ["A) 12", "B) 13", "C) 14", "D) 15"], correct: 3, explanation: "Yüz binler basamağı 9, Yüzler basamağı 6'dır. Sayı değerleri toplamı 9 + 6 = 15'tir." },
            { subject: "Matematik", text: "İllerin uzaklıkları: A(685 km), B(547 km), C(384 km), D(831 km). \nBu uzaklıkları en yakın ONLUĞA ve YÜZLÜĞE yuvarlarsak hangisi YANLIŞ olur?", options: ["A) 685 -> 690 ve 700", "B) 547 -> 550 ve 500", "C) 384 -> 380 ve 300", "D) 831 -> 830 ve 800"], correct: 2, explanation: "384 sayısı en yakın onluğa 380'e, en yakın yüzlüğe ise 400'e yuvarlanır. C şıkkında yüzlük yuvarlama (300) hatalıdır." },
            { subject: "Matematik", text: "Kare = 1329, Üçgen = 1842, Yıldız = 2046, Daire = 2303.\nSembollerle verilen sayılardan hangi ikisi toplanırsa 3375 sayısı elde edilir?", options: ["A) Kare ve Yıldız", "B) Kare ve Üçgen", "C) Yıldız ve Daire", "D) Üçgen ve Daire"], correct: 0, explanation: "1329 (Kare) + 2046 (Yıldız) = 3375 eder." },
            { subject: "Matematik", text: "Hatice Hanım maaşının 925 lirasını mutfak masraflarına, 1575 lirası ile kirasına, 1350 lirası ile de faturalara ödüyor. Hatice Hanım'ın maaşı 6775 TL olduğuna göre geriye kalan parası kaç TL'dir?", options: ["A) 2750", "B) 2925", "C) 2975", "D) 3025"], correct: 1, explanation: "Toplam Gider = 925 + 1575 + 1350 = 3850 TL. Kalan = 6775 - 3850 = 2925 TL." },
            { subject: "Matematik", text: "Bir çiftlikteki hayvanlarla ilgili bilgiler şöyledir:\n- İneklerin sayısı 2 basamaklı en küçük sayının 47 katıdır.\n- Koyunların sayısı yüzler basamağı 7 olan, üç basamaklı en büyük sayıdır.\n- Tavukların sayısı koyunların sayısının 2 katından 600 eksiktir.\nBuna göre çiftlikte toplam kaç hayvan vardır?", options: ["A) 2067", "B) 2167", "C) 2197", "D) 2267"], correct: 3, explanation: "İnek: 10 x 47 = 470. Koyun: 799. Tavuk: (799 x 2) - 600 = 1598 - 600 = 998. Toplam: 470 + 799 + 998 = 2267." },
            { subject: "Matematik", text: "Bir çıkarma işleminde; Eksilen (54AB) - Çıkan (2926) = Fark (2547) verilmiştir. \nBu çıkarma işleminde verilmeyen A ve B rakamlarının toplamı (A + B) kaçtır?", options: ["A) 7", "B) 6", "C) 5", "D) 4"], correct: 0, explanation: "Eksilen = Çıkan + Fark -> 2926 + 2547 = 5473'tür. A=7 ve B=3 olur. Toplamları 7+3=10 olmalıydı ancak şıklara göre A ve B eksilenin 4 ve 3 rakamlarına denk gelerek toplam 7 (A=4, B=3) kastedilmiş. Doğru cevap 7." },
            { subject: "Matematik", text: "Cemil kutucukları çarparak dolduruyor: 12 x 18 = X, 15 x 16 = Y, 25 x 18 = Z. \nÇıkan 3 sonucun da birbirine yakın olduğu bilindiğine göre, aşağıdakilerden hangisi YANLIŞTIR?", options: ["A) İlk çarpım 216'dır.", "B) İkinci çarpım 240'tır.", "C) Üçüncü çarpım 450'dir.", "D) Hepsinin toplamı 806'dır."], correct: 3, explanation: "216 + 240 + 450 = 906 yapar. D şıkkı yanlıştır." },
            { subject: "Matematik", text: "Bir kamyona her birinin kütlesi 64 kg olan kolilerden 75 tane yerleştiriliyor. Kamyonun boş kütlesi 1.248 kg'dır. Bu kamyon içindeki kolilerle birlikte tartılırsa kütlesi kaç kg gelir?", options: ["A) 6.048", "B) 6.100", "C) 6.120", "D) 1.632"], correct: 0, explanation: "Kolilerin kütlesi: 64 x 75 = 4800 kg. Toplam: 4800 + 1248 = 6048 kg." },
            { subject: "Matematik", text: "Bir kalanlı bölme işleminde bölen 25, bölüm 12'dir. \nBu işlemde bölünenin EN BÜYÜK değeri Kayra'nın okul numarasıdır. Kayra'nın okul numarası kaçtır?", options: ["A) 315", "B) 322", "C) 324", "D) 334"], correct: 2, explanation: "Bölen 25 ise kalan en çok 24 olabilir. Bölünen = (Bölen x Bölüm) + Kalan -> (25 x 12) + 24 = 300 + 24 = 324." },
            { subject: "Matematik", text: "(3/8 + 2/8) - (7/8 - 4/8) = ? \nYukarıdaki parantezli kesir işleminin sonucu aşağıdakilerden hangisidir?", options: ["A) 5/8", "B) 4/8", "C) 3/8", "D) 2/8"], correct: 3, explanation: "(5/8) - (3/8) = 2/8'dir." },
            { subject: "Fen Bilimleri", text: "Öğrencilerin ifadelerindeki boşluklara sırasıyla hangileri gelmelidir?\n- Çok eskilerden kalma taşlaşmış kalıntılara _____ denir.\n- Dünya'nın Güneş etrafında yapmış olduğu harekete _____ denir.\n- Dönme hareketi sonucu _____ oluşur.\n- Yer kabuğu _____ lardan oluşmaktadır.", options: ["A) kayaç - dönme - gece/gündüz - toprak", "B) maden - gece/gündüz - fosil - kayaç", "C) fosil - dolanma - gece/gündüz - kayaç", "D) fosil - dönme - mevsimler - kayaç"], correct: 2, explanation: "Sırasıyla: Fosil - Dolanma - Gece/Gündüz - Kayaç kelimeleri gelmelidir." },
            { subject: "Fen Bilimleri", text: "\"Fosil yakıtlar\" denilince aklımıza aşağıdakilerden hangileri gelir?", options: ["A) Demir, bakır, çinko", "B) Cıva, bakır, krom", "C) Bor, mermer, linyit", "D) Kömür, petrol, doğal gaz"], correct: 3, explanation: "Fosil yakıtlar yer altında milyonlarca yılda oluşan kömür, petrol ve doğal gazdır." },
            { subject: "Fen Bilimleri", text: "Besin özellikleri eşleştirmesi:\nI. Protein bakımından zengin ama hayvansal değil. (Bitkisel protein)\nII. Düzenleyici görev yapar, hayvansal değildir. (Vitamin)\nIII. Enerji sağlar, hayvansal besindir. (Karbonhidrat/Bal)\nIV. Enerji ihtiyacı karşılanmadığında devreye girer, hayvansaldır. (Yağ)\nSırasıyla hangileridir?", options: ["A) bal - sebze - patates - zeytin", "B) bulgur - elma - balık - ceviz", "C) fındık - meyve - bal - tereyağı", "D) meyve - balık - bal - ceviz"], correct: 2, explanation: "Fındık (Bitkisel Protein), Meyve (Düzenleyici-Vitamin), Bal (Hayvansal Enerji), Tereyağı (Hayvansal Yağ/Yedek Enerji)." },
            { subject: "Fen Bilimleri", text: "Çocuk bahçesinde atlıkarıncaya binen çocuklar hangi hareketi yaparlar?", options: ["A) Dönme hareketi", "B) Sallanma hareketi", "C) Yön değiştirme", "D) Yavaşlama"], correct: 0, explanation: "Atlıkarınca, kendi ekseni etrafında 'dönme' hareketi yapar." },
            { subject: "Fen Bilimleri", text: "Aşağıdaki eylemlerden hangisinde kuvvetin cisimler üzerindeki etkisi DİĞERLERİNDEN FARKLIDIR?", options: ["A) Tenekenin ezilmesi", "B) Kağıdın yırtılması", "C) Vazonun kırılması", "D) Arabanın hızlanması"], correct: 3, explanation: "Ezilme, yırtılma ve kırılma kuvvetin 'şekil değiştirici' etkisidir. Hızlanma ise 'hareket' etkisidir." },
            { subject: "Fen Bilimleri", text: "I. Yağın sıcakta erimesi\nII. Vazonun kırılması\nIII. Market arabasının hareketi\nIV. Pinpon topunun hareketi\nYukarıdakilerden hangisi kuvvetin cisimler üzerindeki etkilerinden biri OLAMAZ?", options: ["A) I", "B) II", "C) III", "D) IV"], correct: 0, explanation: "Yağın sıcakta erimesi ısının (hal değişiminin) etkisidir, doğrudan fiziksel itme-çekme (kuvvet) etkisi değildir." },
            { subject: "Fen Bilimleri", text: "Tahta, Vida, Kağıt, Çivi, Demir Çubuk, Poşet, Toplu İğne, Su.\nYukarıdaki maddelerden hangileri mıknatıs tarafından çekilir?", options: ["A) Sadece Kağıt ve Poşet", "B) Sadece Vida ve Demir Çubuk", "C) Vida, Çivi, Demir Çubuk, Toplu İğne", "D) Tahta, Su, Çivi"], correct: 2, explanation: "Mıknatıs demir, nikel ve kobalttan yapılmış maddeleri çeker (Vida, Çivi, Demir Çubuk, İğne)." },
            { subject: "Fen Bilimleri", text: "Mıknatısla ilgili verilenlerden hangileri DOĞRUDUR?\nI. Mıknatısların iki zıt kutbu vardır.\nII. Değişik şekilde olabilirler.\nIII. Cisimlere temassız bir kuvvet uygularlar.", options: ["A) Yalnız I", "B) I ve II", "C) I ve III", "D) I, II ve III"], correct: 3, explanation: "Verilen üç ifade de mıknatıslar için doğrudur." },
            { subject: "Fen Bilimleri", text: "Aşağıda verilenlerden hangileri maddenin \"ölçülebilir\" bir özelliğidir?", options: ["A) Suda yüzme - suda batma", "B) Mıknatıs tarafından çekilme", "C) Kütle ve hacim", "D) Renk ve koku"], correct: 2, explanation: "Maddenin kütlesi (teraziyle) ve hacmi (dereceli kapla) ölçülebilir özelliklerdir." },
            { subject: "Fen Bilimleri", text: "I. Su, zeytinyağı, süt\nII. Taş, toprak, odun\nIII. Hava, sis, su buharı\nIV. Tahta parçası, plastik top\nBu maddeler hangi ortak özelliklerine göre gruplandırılmıştır?", options: ["A) I.Sıvı / II.Katı / III.Gaz / IV.Suda Batan", "B) I.Sıvı / II.Katı / III.Gaz / IV.Mıknatıs Çeker", "C) I.Ağır / II.Hafif / III.Sıcak / IV.Soğuk", "D) I.Sıvı maddeler / II.Katı maddeler / III.Gaz maddeler / IV.Suda yüzen maddeler"], correct: 3, explanation: "Su/süt sıvı, taş/odun katı, hava/sis gazdır. Tahta ve plastik ise suda yüzen maddelerdir." },
            { subject: "Sosyal Bilgiler", text: "I. Kronolojik sıralama olayların oluş tarihlerine göre yapılır.\nII. Tüm bireylerin parmak izleri aynıdır.\nIII. Yeni kimlik kartlarının arka yüzünde çip (Yonga) adı verilen bölüm vardır.\nIV. T.C. numaramız 11 rakamdan oluşur.\nBu bilgilerin Doğru (D) - Yanlış (Y) sıralaması nasıldır?", options: ["A) D - D - Y - Y", "B) D - Y - D - D", "C) Y - Y - D - Y", "D) D - D - D - D"], correct: 1, explanation: "Parmak izleri aynı değildir (Yanlış). Diğer tüm maddeler Doğrudur (D-Y-D-D)." },
            { subject: "Sosyal Bilgiler", text: "Aşağıdaki öğrencilerden hangisinin söylediği ifade, çevresine karşı \"duyarlı\" bir öğrencinin davranışı OLAMAZ?", options: ["A) Serra: Hastalanan arkadaşıma geçmiş olsun derim.", "B) Kayra: Düşüp yaralanan birine yardım ederim.", "C) Mehmet: Ağlayan arkadaşımın duygularına ortak olurum.", "D) Hatice: Sınavdan kötü not alan arkadaşımla dalga geçerim."], correct: 3, explanation: "Zor durumdaki bir arkadaşla dalga geçmek duyarlı değil, kaba ve yanlış bir davranıştır." },
            { subject: "Sosyal Bilgiler", text: "Milli Mücadele Dönemine ait tarihi olaylar ve gerçekleşme tarihleri eşleştirmelerinden hangisi YANLIŞTIR?", options: ["A) TBMM'nin Açılışı -> 23 Nisan 1920", "B) M. Kemal'in Samsun'a Çıkışı -> 19 Mayıs 1920", "C) İzmir'in Kurtuluşu -> 9 Eylül 1922", "D) Cumhuriyet'in İlanı -> 29 Ekim 1923"], correct: 1, explanation: "M. Kemal Samsun'a 19 Mayıs 1919'da çıkmıştır. 1920 tarihi yanlıştır." },
            { subject: "Sosyal Bilgiler", text: "1. Çorum -> .........\n2. Kayseri -> .........\n3. Amasya -> .........\nYukarıdaki illerimizin meşhur (önemli) ürünleri sırasıyla hangi seçenekte verilmiştir?", options: ["A) Leblebi / Mantı / Elma", "B) Kayısı / Karpuz / Portakal", "C) Mantı / Leblebi / Kayısı", "D) Kayısı / Elma / Üzüm"], correct: 0, explanation: "Çorum leblebisi, Kayseri mantısı ve Amasya elması ile ünlüdür." },
            { subject: "Sosyal Bilgiler", text: "Aşağıda Milli Mücadele kahramanları ve mücadele ettikleri iller eşleştirilmiştir. Hangi eşleştirme YANLIŞTIR?", options: ["A) Hasan Tahsin -> İzmir", "B) Sütçü İmam -> Maraş", "C) Ali Saip Bey -> Urfa", "D) Kazım Karabekir -> Antep"], correct: 3, explanation: "Kazım Karabekir, Doğu Cephesinde (Erzurum, Kars vb.) Ermenilere karşı savaşmıştır, Antep'te değil." },
            { subject: "Sosyal Bilgiler", text: "Türkiye Haritası bilgilerine göre aşağıdaki yargılardan hangisi YANLIŞTIR?", options: ["A) En batıdaki ilimiz Aydın'dır.", "B) İstanbul yurdumuzun kuzeybatısındadır.", "C) Antalya güneyde bulunan bir ilimizdir.", "D) Yurdumuzun kuzeydoğusunda Ardahan yer alır."], correct: 0, explanation: "Türkiye'nin en batı ucu Çanakkale (Gökçeada)'dir, Aydın değildir. A şıkkı yanlıştır." },
            { subject: "Sosyal Bilgiler", text: "İnsanlar hayatını kolaylaştırmak için beşeri unsurlar inşa ederken bazen doğal unsurlara zarar vermektedirler. Buna göre aşağıdakilerden hangisi doğaya ZARAR VERMEYEN bir uygulamadır?", options: ["A) Fabrika atıklarının dereye akıtılması", "B) Barınmak için boş arazilere ev yapılması", "C) Taşıtların egzozundan çıkan zararlı gazlar", "D) Çıplak arazilerin ağaçlandırılarak ormana dönüştürülmesi"], correct: 3, explanation: "Ağaçlandırma yapmak doğaya zarar vermez, aksine doğayı onarır." },
            { subject: "Sosyal Bilgiler", text: "Aşağıdakilerden hangisi bir doğal afet DEĞİLDİR?", options: ["A) Yanardağ Patlaması", "B) Toprak Kayması (Heyelan)", "C) Trafik Kazası", "D) Çığ Düşmesi"], correct: 2, explanation: "Trafik kazası insanların hatalarından kaynaklanan beşeri bir olaydır, doğal afet değildir." },
            { subject: "Sosyal Bilgiler", text: "Teknolojik gelişmelerin birçok yararı yanında bazı sorunlara da yol açtığı bilinmektedir. Aşağıdakilerden hangisi bu sorunlardan biri DEĞİLDİR?", options: ["A) Çevre kirliliğinin artması", "B) Sağlığımıza zarar vermesi", "C) Bazı bitki ve hayvan türlerinin yok olması", "D) Bilgiye daha hızlı ulaşılması"], correct: 3, explanation: "Bilgiye hızlı ulaşmak teknolojinin bir sorunu/zararı değil, en büyük faydalarından biridir." },
            { subject: "Sosyal Bilgiler", text: "Ülkemizde doğal afetlerde (deprem, sel, çığ vb.) arama kurtarma çalışmaları yapmak üzere kurulan ve gönüllülerden oluşan dernek hangisidir?", options: ["A) Darüşşafaka", "B) TEV (Türk Eğitim Vakfı)", "C) AKUT (Arama Kurtarma Derneği)", "D) Yeşilay"], correct: 2, explanation: "AKUT, doğal afetlerde can kurtarmak için kurulan bir arama kurtarma derneğidir." },
            { subject: "İngilizce", text: "Duvardaki saat 11:30'u göstermektedir. \"It is ________ eleven.\"\nBoşluğa saatin 'buçuk' olduğunu belirten hangi ifade gelmelidir?", options: ["A) quarter past", "B) half past", "C) o'clock", "D) quarter to"], correct: 1, explanation: "Buçuklu saatlerde 'half past' kullanılır. Half past eleven: On bir buçuk." },
            { subject: "İngilizce", text: "\"I _______ my breakfast at seven in the morning.\" (Sabah yedide kahvaltımı yaparım.)\nCümlesinde boş bırakılan yere hangi kelime gelmelidir?", options: ["A) eats", "B) has", "C) do", "D) have"], correct: 3, explanation: "Kahvaltı yapmak İngilizcede 'have breakfast' olarak ifade edilir. 'I have my breakfast' doğru kullanımdır." },
            { subject: "İngilizce", text: "Görselde bir sahada ayaklarıyla top oynayan (futbol) çocuklar vardır.\nBu etkinliğin İngilizce karşılığı hangi seçenekte verilmiştir?", options: ["A) chess", "B) video games", "C) tennis", "D) play soccer (football)"], correct: 3, explanation: "Futbol oynamak İngilizcede 'play soccer' veya 'play football' olarak ifade edilir." },
            { subject: "İngilizce", text: "My father likes ________ in his free time. (Görselde havuzda yüzen bir adam vardır.)\nBoşluğa gelmesi gereken kelime hangisidir?", options: ["A) walking", "B) swimming", "C) running", "D) sleeping"], correct: 1, explanation: "Yüzmek kelimesinin İngilizce karşılığı 'swimming'dir." },
            { subject: "İngilizce", text: "Hakan likes ________. (Görselde gökyüzünde uçurtma uçuran bir çocuk vardır.)\nBoşluğa gelmesi gereken kelime hangisidir?", options: ["A) singing", "B) swimming", "C) drawing", "D) flying a kite"], correct: 3, explanation: "Uçurtma uçurmak eyleminin İngilizce karşılığı 'flying a kite' dır." }
        ];

        // --- 6. SET: 9. DENEME (SONER HOCA - 30 SORU) ---
        const q_deneme_9 = [
            { subject: "Türkçe", text: "Yusuf, okullar arası koşu yarışmasına hazırlanıyordu. Düzenli olarak minik dostu Yıldız ile koşmaya çıkıyordu. Yıldız, her gün Yusuf'un okuldan gelmesini dört gözle bekliyordu. Yıldız'ın hızı, zamanla Yusuf'un da hızının artmasına sebep oldu. Yarışma günü geldiğinde Yusuf, rakiplerine büyük fark atarak birinci oldu.\n\nYusuf neden koşmaya gidiyordu?", options: ["A) Zayıflamak için", "B) Yarışmaya hazırlanmak için", "C) Yıldızı gezdirmek için", "D) Korktuğu için"], correct: 1, explanation: "Metnin ilk cümlesinde Yusuf'un koşu yarışmasına hazırlanmak için koştuğu açıkça belirtilmiştir." },
            { subject: "Türkçe", text: "Metnin son cümlesi şöyledir: \"Sevincini ilk olarak ona büyük katkı sağlayan minik dostuyla paylaştı.\"\nBu cümle ile ilgili aşağıdakilerden hangisi söylenemez?", options: ["A) Ön ad kullanılmıştır.", "B) Adıl kullanılmıştır.", "C) Eylem geçmiş zamanlıdır.", "D) Tek başına anlamı olmayan bir kelime kullanılmamıştır."], correct: 3, explanation: "Cümlede 'ile (dostuyla)' kelimesi vardır ve tek başına anlamı yoktur. D şıkkı söylenemez." },
            { subject: "Türkçe", text: "Aşağıdaki cümlelerin hangisinde yazım hatası yapılmıştır?", options: ["A) Kitabımı da evde unutmuşum.", "B) Bu statta maç yapılacak.", "C) Herkez buraya gelsin.", "D) Yarın Ankara'ya gidecek."], correct: 2, explanation: "Türkçede 'herkez' değil, 'herkes' olarak yazılır. C şıkkında yazım hatası vardır." },
            { subject: "Türkçe", text: "Aşağıdaki kelimelerden hangisi bir varlığın özelliğini nitelemek (sıfat) için kullanılmaz?", options: ["A) küçük", "B) güzel", "C) beyaz", "D) bölüm"], correct: 3, explanation: "Küçük, güzel ve beyaz kelimeleri varlıkların durumunu ve rengini niteleyen ön adlardır (sıfat). 'Bölüm' ise bir isimdir." },
            { subject: "Türkçe", text: "\"Geniş\" ve \"Dar\" kelimeleri arasındaki anlam ilişkisinin (Zıt Anlam) aynısı aşağıdaki kelime çiftlerinin hangisinde vardır?", options: ["A) Taze - Bayat", "B) Ev - Konut", "C) Siyah - Kara", "D) Nehir - Irmak"], correct: 0, explanation: "Geniş ve Dar zıt anlamlıdır. Taze ve Bayat da birbirinin zıttıdır. Diğerleri eş anlamlıdır." },

            { subject: "Fen Bilimleri", text: "Mıknatıs, aşağıdaki maddelerden hangisini çeker?", options: ["A) Plastik", "B) Nikel", "C) Tahta", "D) Cam"], correct: 1, explanation: "Mıknatıslar sadece demir, nikel ve kobalttan yapılmış maddeleri çeker." },

        const q_deneme_10 = [
            { subject: "Türkçe", text: "Deve kuşu uçamayan, yeryüzünde var olan en büyük kuş türüdür. Uzun bacaklara ve uzun bir boyna sahiptir. Sahip olduğu uzun ve kaslı bacakları sayesinde, bir tehlike ile karşılaştığında 30 dakika boyunca yorulmadan koşabilirler. Koşarken çok yüksek bir hıza ulaşabilirler. Kanatlarını açtıkları zaman 2 metre kadar genişliğe ulaşır. Ayrıca gözleri, güneş ışığından korunmak amacıyla gölgelendirilmiş bir yapıdadır.\n\nAşağıdakilerden hangisi deve kuşlarının özelliklerinden birisi DEĞİLDİR?", options: ["A) Yeryüzündeki en büyük kuş türüdür.", "B) Uzun bacaklara sahiptirler.", "C) Uzun süre boyunca yorulmadan koşabilirler.", "D) Kanatları dar bir yapıya sahiptir."], correct: 3, explanation: "Metinde deve kuşlarının kanatlarını açtığında çok geniş bir yapıya ulaştığı belirtilmiştir. Kanatları dar değildir." },
            { subject: "Türkçe", text: "Metne göre deve kuşlarının gözleri neden gölgelidir?", options: ["A) Daha iyi görebilmeleri için", "B) Tozdan korunmak için", "C) Güneş ışığından korunmak için", "D) Kamufle olmak için"], correct: 2, explanation: "Metinde açıkça 'gözleri, güneş ışığından korunmak amacıyla gölgelendirilmiş bir yapıdadır' yazmaktadır." },
            { subject: "Türkçe", text: "\"Osman, tilki gibi kurnaz bir adamdır.\"\nYukarıdaki cümle ile ilgili aşağıdaki söylenenlerden hangisi YANLIŞTIR?", options: ["A) Kurallı bir cümledir.", "B) Benzetme yapılmıştır.", "C) Tek başına anlamı olmayan bir sözcük kullanılmıştır.", "D) Fiili geçmiş zamanlıdır."], correct: 3, explanation: "Cümlede 'adamdır' ifadesi geniş/şimdiki zamanı bildirir. Geçmiş zamanlı bir ifade (di, -miş) yoktur. 'Gibi' tek başına anlamı olmayan bir edattır ve benzetme yapılmıştır." },
            { subject: "Türkçe", text: "Aşağıdaki cümlelerin hangisinde \"karanlık\" kelimesi MECAZ anlamda kullanılmıştır?", options: ["A) Hava aniden karanlık oldu.", "B) O, her zaman karanlık işler peşindeydi.", "C) Oda çok karanlık olduğu için ışığı açtım.", "D) Karanlıkta önümü göremedim."], correct: 1, explanation: "B şıkkındaki 'karanlık işler', yasa dışı veya gizli, kötü işler anlamında mecaz olarak kullanılmıştır." },
            { subject: "Türkçe", text: "\"Ağaç\" kelimesine aşağıdaki eklerden hangisi getirilirse kelime YENİ BİR ANLAM kazanır (yapım eki almış olur)?", options: ["A) -lar", "B) -da", "C) -lık", "D) -ın"], correct: 2, explanation: "Ağaç kelimesine '-lık' eki getirilince 'Ağaçlık' (ağaçların çok olduğu yer) olur ve kelimenin anlamı değişir. Diğerleri çekim ekidir." },
            { subject: "Türkçe", text: "Aşağıdaki cümlelerin hangisinde \"Neden-Sonuç (Sebep-Sonuç)\" ilişkisi vardır?", options: ["A) Yağmur yağınca hepimiz hemen içeri girdik.", "B) Ders çalışmak için odasına gitti.", "C) Seni görmek üzere buraya kadar geldim.", "D) Akşam olunca bebek uyudu."], correct: 0, explanation: "İçeri girmemizin sebebi (nedeni) yağmurun yağmasıdır. B ve C şıkları amaç-sonuç cümleleridir." },
            { subject: "Matematik", text: "4, 0, 5, 8 rakamları birer kez kullanılarak yazılabilecek 4 basamaklı EN BÜYÜK çift sayı kaçtır?", options: ["A) 8540", "B) 8504", "C) 8450", "D) 5840"], correct: 0, explanation: "En büyük sayı olması için en büyük rakamdan başlarız: 8540. Aynı zamanda sonu 0 olduğu için çifttir." },
            { subject: "Matematik", text: "35 ile 12'nin çarpımı kaçtır?", options: ["A) 420", "B) 400", "C) 380", "D) 450"], correct: 0, explanation: "35 x 12 = 420 yapar." },
            { subject: "Matematik", text: "Bir bölme işleminde bölen 12, bölüm 15 ve kalan 7'dir.\nBuna göre BÖLÜNEN sayı kaçtır?", options: ["A) 180", "B) 187", "C) 190", "D) 197"], correct: 1, explanation: "Bölünen = (Bölen x Bölüm) + Kalan. (12 x 15) + 7 = 180 + 7 = 187'dir." },
            { subject: "Matematik", text: "3 tam 2/5 (Üç tam beşte iki) tam sayılı kesri, bileşik kesre çevrildiğinde aşağıdakilerden hangisi elde edilir?", options: ["A) 15/5", "B) 17/5", "C) 13/5", "D) 19/5"], correct: 1, explanation: "Tam kısım ile payda çarpılır, pay ile toplanır: (3 x 5) + 2 = 17. Payda aynı kalır: 17/5." },
            { subject: "Matematik", text: "2 saat 45 dakika toplam kaç dakikadır?", options: ["A) 165 dakika", "B) 145 dakika", "C) 125 dakika", "D) 185 dakika"], correct: 0, explanation: "1 Saat = 60 dakikadır. 2 saat = 120 dakika. 120 + 45 = 165 dakika." },
            { subject: "Matematik", text: "Bir karenin çevre uzunluğu 48 cm'dir.\nBuna göre bu karenin bir kenar uzunluğu kaç cm'dir?", options: ["A) 10", "B) 12", "C) 14", "D) 16"], correct: 1, explanation: "Karenin 4 eşit kenarı vardır. Bir kenarını bulmak için çevreyi 4'e böleriz: 48 ÷ 4 = 12 cm." },

            { subject: "Fen Bilimleri", text: "Islak çamaşırların ipe asılıp bir süre sonra kuruması, maddenin hangi hâl değişimine örnektir?", options: ["A) Buharlaşma", "B) Erime", "C) Donma", "D) Süblimleşme"], correct: 0, explanation: "Islak çamaşırdaki sıvı su, Güneş'ten ısı alarak buharlaşır ve gaz haline geçer. Bu olaya buharlaşma denir." },

                                    </div>
                                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div class="bg-secondary h-full" style="width: ${progress.score}%"></div>
                                    </div>
                                    <button onclick="event.stopPropagation(); app.showResults('${key}')" class="w-full mt-4 py-3.5 bg-slate-50 text-slate-600 rounded-xl text-xs font-black hover:bg-slate-800 hover:text-white transition uppercase tracking-widest">Karnemi İncele</button>
                                </div>
                            ` : `
                                <div class="mt-auto pt-8 border-t border-slate-50">
                                    <div class="flex justify-between items-center text-indigo-600 group-hover:translate-x-2 transition duration-300">
                                        <span class="text-sm font-black tracking-widest">HEMEN BAŞLA</span>
                                        <i class="fa-solid fa-circle-arrow-right text-3xl"></i>
                                    </div>
                                </div>
                            `}
                        </div>
                    `;
                });

                html += `</div>`;
                appContainer.innerHTML = html;
                window.scrollTo(0,0);
            },

            startExam: function(monthId) {
                if(userProgress[monthId]) { this.showResults(monthId); return; }
                currentMonthId = monthId;
                currentAnswers = {};
                currentQuestionIndex = 0;
                this.renderExamUI();
            },

            renderExamUI: function() {
                const month = examDataMap[currentMonthId];
                appContainer.innerHTML = `
                    <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col lg:flex-row min-h-[650px] border border-gray-100">
                        <div class="flex-grow flex flex-col">
                            <div class="${month.theme} px-8 md:px-12 py-6 flex justify-between items-center border-b shadow-sm">
                                <div class="flex items-center gap-3">
                                    <i class="fa-solid fa-stopwatch text-2xl opacity-40"></i>
                                    <span class="font-black text-sm tracking-widest uppercase">${month.title}</span>
                                </div>
                                <button onclick="app.showDashboard()" class="bg-white/50 hover:bg-white text-[10px] font-black px-6 py-2.5 rounded-full transition shadow-sm uppercase tracking-widest text-slate-800">VAZGEÇ / ÇIK</button>
                            </div>
                            <div id="question-area" class="p-8 md:p-16 flex-grow flex flex-col justify-center"></div>
                            <div class="p-8 bg-slate-50 border-t flex justify-between items-center">
                                <button id="btn-prev" onclick="app.prevQ()" class="px-8 py-4 rounded-2xl font-black text-slate-400 hover:bg-slate-200 transition disabled:opacity-20 uppercase tracking-widest text-xs">GERİ</button>
                                <button id="btn-next" onclick="app.nextQ()" class="px-12 py-4 rounded-2xl font-black bg-indigo-600 text-white shadow-xl shadow-indigo-200 hover:scale-105 transition uppercase tracking-widest text-xs">İLERİ <i class="fa-solid fa-chevron-right ml-2"></i></button>
                            </div>
                        </div>
                        <div class="w-full lg:w-80 bg-slate-50 border-l border-slate-100 p-8 flex flex-col">
                            <h4 class="font-black text-slate-400 text-[10px] uppercase mb-6 tracking-[0.3em] text-center">Soru Navigasyonu</h4>
                            <div class="grid grid-cols-5 gap-3 overflow-y-auto pr-2 pb-4" id="nav-bubbles" style="max-height: 45vh;"></div>
                            <div class="mt-auto pt-6 border-t border-slate-200">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">İlerleme</span>
                                    <span id="progress-txt" class="text-xl font-black text-indigo-600">0%</span>
                                </div>
                                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden mb-6">
                                    <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                                <button onclick="app.finishConfirm()" class="w-full py-5 bg-secondary text-white font-black rounded-2xl shadow-xl shadow-emerald-100 hover:brightness-105 transition text-sm tracking-widest uppercase">
                                    SINAVI BİTİR
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                this.updateQuestion();
            },

            updateQuestion: function() {
                const questions = examDataMap[currentMonthId].questions;
                const q = questions[currentQuestionIndex];
                const area = document.getElementById('question-area');
                
                area.innerHTML = `
                    <div class="fade-in">
                        <div class="flex items-center gap-4 mb-10">
                            <span class="bg-slate-800 text-white text-[10px] font-black px-5 py-2 rounded-full uppercase tracking-widest shadow-md">${q.subject}</span>
                            <div class="h-1 flex-grow bg-slate-100 rounded-full"></div>
                            <span class="text-indigo-600 font-black text-sm uppercase bg-indigo-50 px-4 py-2 rounded-xl">SORU ${currentQuestionIndex+1} / ${questions.length}</span>
                        </div>
                        <h3 class="text-xl md:text-3xl font-extrabold text-slate-800 mb-12 leading-relaxed whitespace-pre-line">${q.text}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            ${q.options.map((opt, i) => `
                                <div onclick="app.select(${i})" class="option-btn group border-2 border-slate-200 rounded-3xl p-6 cursor-pointer flex items-center gap-6 bg-white shadow-sm transition-all ${currentAnswers[currentQuestionIndex] === i ? 'option-selected' : ''}">
                                    <div class="w-12 h-12 rounded-2xl ${currentAnswers[currentQuestionIndex] === i ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'} flex-shrink-0 flex items-center justify-center font-black transition shadow-inner text-lg">${['A','B','C','D'][i]}</div>
                                    <span class="text-lg font-bold ${currentAnswers[currentQuestionIndex] === i ? 'text-indigo-600' : 'text-slate-600'} leading-tight">${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
                
                const btnNext = document.getElementById('btn-next');
                if(currentQuestionIndex === questions.length - 1) {
                    btnNext.innerHTML = 'BİTİR <i class="fa-solid fa-flag-checkered ml-2"></i>';
                    btnNext.classList.replace('bg-indigo-600', 'bg-secondary');
                    btnNext.classList.replace('shadow-indigo-200', 'shadow-emerald-200');
                    btnNext.classList.replace('hover:scale-105', 'hover:brightness-105');
                } else {
                    btnNext.innerHTML = 'İLERİ <i class="fa-solid fa-chevron-right ml-2"></i>';
                    btnNext.classList.replace('bg-secondary', 'bg-indigo-600');
                    btnNext.classList.replace('shadow-emerald-200', 'shadow-indigo-200');
                }

                const answered = Object.keys(currentAnswers).length;
                const perc = Math.round((answered / questions.length) * 100);
                document.getElementById('progress-bar').style.width = perc + '%';
                document.getElementById('progress-txt').innerText = perc + '%';
                
                this.updateBubbles();
            },

            updateBubbles: function() {
                const bubbles = document.getElementById('nav-bubbles');
                bubbles.innerHTML = examDataMap[currentMonthId].questions.map((_, i) => `
                    <div onclick="app.jump(${i})" class="nav-bubble aspect-square rounded-xl flex items-center justify-center cursor-pointer text-xs font-black border-2 
                        ${i === currentQuestionIndex ? 'active text-indigo-600' : (currentAnswers[i] !== undefined ? 'answered' : 'bg-white text-slate-400 hover:bg-slate-100')}">
                        ${i+1}
                    </div>
                `).join('');
            },

            select: function(idx) { currentAnswers[currentQuestionIndex] = idx; this.updateQuestion(); },
            jump: function(i) { currentQuestionIndex = i; this.updateQuestion(); },
            nextQ: function() { if(currentQuestionIndex < examDataMap[currentMonthId].questions.length-1) { currentQuestionIndex++; this.updateQuestion(); } else { app.finishConfirm(); } },
            prevQ: function() { if(currentQuestionIndex > 0) { currentQuestionIndex--; this.updateQuestion(); } },

            finishConfirm: function() {
                const questions = examDataMap[currentMonthId].questions;
                const empty = questions.length - Object.keys(currentAnswers).length;
                if(empty > 0) {
                    const modal = document.getElementById('custom-modal');
                    document.getElementById('modal-desc').innerText = `Sınavda henüz işaretlemediğin ${empty} soru var. Yine de bitirip sonuçları görmek istiyor musun?`;
                    modal.classList.remove('hidden');
                    setTimeout(() => { modal.classList.remove('opacity-0'); document.getElementById('custom-modal-content').classList.remove('scale-95'); }, 10);
                    return;
                }
                app.forceFinish();
            },

            closeModal: function() {
                const modal = document.getElementById('custom-modal');
                modal.classList.add('opacity-0');
                document.getElementById('custom-modal-content').classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 300);
            },

            forceFinish: function() {
                app.closeModal();
                const questions = examDataMap[currentMonthId].questions;
                let correct = 0;
                let subjects = {};
                
                questions.forEach((q, i) => {
                    const subj = q.subject || 'Genel';
                    if(!subjects[subj]) subjects[subj] = { t:0, c:0 };
                    subjects[subj].t++;
                    if(currentAnswers[i] === q.correct) { correct++; subjects[subj].c++; }
                });

                const finalSubjects = {};
                for(let s in subjects) finalSubjects[s] = Math.round((subjects[s].c / subjects[s].t)*100);

                userProgress[currentMonthId] = {
                    score: Math.round((correct / questions.length) * 100),
                    correct: correct,
                    total: questions.length,
                    answers: currentAnswers,
                    subjects: finalSubjects
                };

                localStorage.setItem('grade4_combined_exams_v5', JSON.stringify(userProgress));
                this.showResults(currentMonthId);
            },

            showResults: function(monthId) {
                const month = examDataMap[monthId];
                const res = userProgress[monthId];
                
                appContainer.innerHTML = `
                    <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden mb-12 border border-gray-100 fade-in">
                        <div class="bg-gradient-to-br from-slate-900 to-indigo-900 p-12 md:p-20 text-center text-white relative">
                            <button onclick="app.showDashboard()" class="absolute top-8 left-8 text-[10px] font-black bg-white/10 hover:bg-white/20 px-6 py-3 rounded-full tracking-widest transition border border-white/10"><i class="fa-solid fa-chevron-left mr-2"></i> ANA MENÜYE DÖN</button>
                            <h2 class="text-4xl md:text-5xl font-black mb-8 tracking-tight">${month.title} KARNESİ</h2>
                            <div class="flex flex-col md:flex-row justify-center items-center gap-8 mb-10">
                                <div class="bg-white/10 backdrop-blur-md p-8 rounded-[2.5rem] border border-white/20">
                                    <div class="text-8xl font-black leading-none">${res.score}</div>
                                    <div class="text-[10px] font-bold opacity-60 uppercase mt-2 tracking-widest">Başarı Puanı</div>
                                </div>
                                <div class="text-left space-y-3">
                                    <div class="text-sm font-black bg-emerald-500/40 text-emerald-100 px-5 py-2.5 rounded-xl flex items-center gap-3"><i class="fa-solid fa-check-circle text-xl"></i> ${res.correct} DOĞRU CEVAP</div>
                                    <div class="text-sm font-black bg-rose-500/40 text-rose-100 px-5 py-2.5 rounded-xl flex items-center gap-3"><i class="fa-solid fa-times-circle text-xl"></i> ${res.total - res.correct} YANLIŞ VEYA BOŞ</div>
                                </div>
                            </div>
                            <p class="font-bold text-indigo-300 text-xs tracking-[0.3em] uppercase italic">Aşağıdan yanlış yaptığın soruları ve açıklamaları incele.</p>
                        </div>

                        <div class="p-8 bg-slate-50/50 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 border-b border-gray-100">
                            ${Object.keys(res.subjects).map(s => `
                                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 text-center hover:-translate-y-1 transition-transform">
                                    <div class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest truncate">${s}</div>
                                    <div class="text-2xl font-black text-indigo-600">%${res.subjects[s]}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="p-8 md:p-16">
                            <h3 class="text-2xl font-black text-slate-800 mb-10 flex items-center gap-3"><i class="fa-solid fa-magnifying-glass-chart text-indigo-600"></i> Soru Bazlı Hata Analizi</h3>
                            <div class="grid grid-cols-1 gap-8">
                                ${month.questions.map((q, i) => {
                                    const userAns = res.answers[i];
                                    const isCorrect = userAns === q.correct;
                                    const isUnanswered = userAns === undefined || userAns === null;
                                    const borderClass = isCorrect ? 'border-emerald-200 bg-emerald-50/20' : 'border-rose-200 bg-rose-50/20';
                                    
                                    return `
                                        <div class="p-6 md:p-10 border-2 rounded-[2.5rem] ${borderClass} transition-all duration-300 relative overflow-hidden">
                                            ${!isCorrect ? '<div class="absolute left-0 top-0 w-3 h-full bg-rose-400"></div>' : ''}
                                            <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-8 pl-2">
                                                <div class="flex items-center gap-3">
                                                    <span class="text-[10px] bg-slate-800 text-white px-5 py-2 rounded-full font-black uppercase tracking-widest">${q.subject}</span>
                                                    <span class="font-black text-slate-400 text-sm">Soru ${i+1}</span>
                                                </div>
                                                <span class="text-[10px] font-black px-5 py-2 rounded-full tracking-widest ${isCorrect ? 'bg-secondary text-white' : (isUnanswered ? 'bg-slate-400 text-white' : 'bg-danger text-white')}">
                                                    ${isCorrect ? '<i class="fa-solid fa-check mr-1"></i> DOĞRU' : (isUnanswered ? '<i class="fa-solid fa-minus mr-1"></i> BOŞ' : '<i class="fa-solid fa-xmark mr-1"></i> YANLIŞ')}
                                                </span>
                                            </div>
                                            
                                            <p class="font-bold text-slate-800 text-lg md:text-xl mb-10 whitespace-pre-line leading-relaxed pl-2">${q.text}</p>
                                            
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 pointer-events-none pl-2">
                                                ${q.options.map((opt, oi) => {
                                                    let style = "bg-white border-slate-200 text-slate-500";
                                                    let icon = "";
                                                    if(oi === q.correct) {
                                                        style = "bg-secondary border-secondary text-white shadow-md";
                                                        icon = '<i class="fa-solid fa-check-circle ml-auto text-2xl"></i>';
                                                    } else if(oi === userAns && !isCorrect) {
                                                        style = "bg-danger border-danger text-white shadow-md";
                                                        icon = '<i class="fa-solid fa-times-circle ml-auto text-2xl"></i>';
                                                    }
                                                    
                                                    return `
                                                        <div class="p-5 border-2 rounded-2xl text-sm font-bold flex items-center gap-4 ${style}">
                                                            <div class="w-10 h-10 rounded-xl bg-black/10 flex items-center justify-center flex-shrink-0 text-base">${['A','B','C','D'][oi]}</div>
                                                            <span>${opt}</span>
                                                            ${icon}
                                                        </div>
                                                    `;
                                                }).join('')}
                                            </div>
                                            
                                            <button onclick="document.getElementById('exp-${monthId}-${i}').classList.toggle('show')" class="text-xs font-black text-indigo-600 hover:text-indigo-800 uppercase tracking-widest flex items-center gap-2 mt-6 bg-white border border-indigo-100 px-6 py-3 rounded-full transition shadow-sm ml-2">
                                                <i class="fa-solid fa-lightbulb"></i> Öğretmen Çözümünü Gör
                                            </button>
                                            
                                            <div id="exp-${monthId}-${i}" class="explanation-box ml-2">
                                                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-6 rounded-r-3xl shadow-inner mt-4">
                                                    <span class="text-[10px] font-black text-indigo-900 uppercase tracking-widest block mb-3 flex items-center gap-2"><i class="fa-solid fa-pen-nib"></i> Çözüm Mantığı:</span>
                                                    <p class="text-sm font-bold text-slate-700 leading-relaxed">${q.explanation}</p>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
                window.scrollTo(0,0);
            },

            resetData: function() {
                if(confirm("Bütün başarı kayıtların ve karnen silinecek. Emin misin?")) {
                    localStorage.removeItem('grade4_combined_exams_v5');
                    userProgress = {};
                    this.showDashboard();
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
